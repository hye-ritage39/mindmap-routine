<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루틴 마인드맵</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f6f3; --bg-tertiary:#efede8;
  --border-light:#e2dfd8; --border-mid:#ccc9c0;
  --text-primary:#1a1a18; --text-secondary:#555550; --text-tertiary:#999890;
  --danger:#A32D2D; --danger-border:#F09595;
  --accent:#1a1a18;
  --radius-sm:6px; --radius-md:8px;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
}
body { background:var(--bg-secondary); color:var(--text-primary); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100vh; }
#main { display:flex; flex:1; overflow:hidden; min-width:0; }
#left  { width:160px; flex-shrink:0; background:var(--bg-secondary); border-right:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
#center{ flex:1; min-width:0; position:relative; background:var(--bg-primary); overflow:hidden; }
#right { width:210px; flex-shrink:0; background:var(--bg-secondary); border-left:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
#bottombar { height:48px; background:var(--bg-secondary); border-top:1px solid var(--border-light); display:flex; align-items:center; justify-content:center; gap:8px; flex-shrink:0; }

/* 패널 타이틀 */
.ptitle { font-size:14px; font-weight:600; color:var(--text-primary); padding:13px 13px 9px; border-bottom:1px solid var(--border-light); flex-shrink:0; }

/* 좌측 리스트 */
#lscroll { flex:1; overflow-y:auto; padding:8px 10px; }
.lsec-lbl { font-size:12px; font-weight:600; margin:10px 0 4px 2px; }
/* 리스트 드래그 */
.lsection { margin-bottom:2px; }
.lsec-row { display:flex; align-items:center; gap:4px; padding:4px 4px 4px 2px; border-radius:var(--radius-sm); cursor:grab; transition:background .1s; }
.lsec-row:hover { background:var(--bg-primary); }
.ltask-list { padding-left:4px; min-height:4px; }
.ldrag-handle { font-size:13px; color:var(--text-tertiary); cursor:grab; flex-shrink:0; line-height:1; padding:0 2px; opacity:0; transition:opacity .15s; }
.lsec-row:hover .ldrag-handle,
.litem:hover .ldrag-handle { opacity:1; }
.litem { display:flex; align-items:flex-start; gap:5px; padding:5px 6px; border-radius:var(--radius-sm); cursor:pointer; margin-bottom:2px; transition:background .1s, border .1s; border:1px solid transparent; }
.litem:hover { background:var(--bg-primary); }
.litem.sel { background:var(--bg-primary); border-color:var(--border-mid); }
.ldrop-line { border:1.5px dashed var(--border-mid) !important; background:var(--bg-tertiary) !important; }
.ldot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.ltext { font-size:11px; color:var(--text-primary); line-height:1.4; flex:1; word-break:keep-all; }
.lbadge { font-size:10px; color:var(--text-tertiary); line-height:1.4; margin-top:1px; }

/* 우측 패널 */
#rscroll { flex:1; overflow-y:auto; padding:11px 12px; }
.rlbl { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border-light); }
.rslbl { font-size:12px; color:var(--text-secondary); margin:7px 0 3px; }
.rinput { width:100%; height:30px; font-size:12px; padding:0 8px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; margin-bottom:3px; font-family:inherit; }
.rinput::placeholder { font-size:12px; color:var(--text-tertiary); }
.rinput:focus { border-color:var(--border-mid); }
.rtarea { width:100%; height:46px; font-size:12px; padding:6px 8px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; resize:none; margin-bottom:3px; line-height:1.5; font-family:inherit; }
.rtarea::placeholder { font-size:12px; color:var(--text-tertiary); }
.rtarea:focus { border-color:var(--border-mid); }
.rbtn { width:100%; height:30px; font-size:12px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); cursor:pointer; margin-bottom:3px; display:flex; align-items:center; justify-content:center; gap:5px; transition:background .1s; font-family:inherit; }
.rbtn:hover { background:var(--bg-tertiary); }
.rbtn.pri { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }
.rbtn.pri:hover { opacity:.82; }
.rbtn.dan { color:var(--danger); border-color:var(--danger-border); }
.rtag { padding:5px 8px; border-radius:var(--radius-sm); border:1px solid var(--border-light); font-size:12px; color:var(--text-primary); background:var(--bg-primary); cursor:pointer; margin-bottom:3px; width:100%; text-align:left; display:flex; align-items:center; gap:6px; transition:background .1s; line-height:1.35; word-break:keep-all; font-family:inherit; }
.rtag:hover { background:var(--bg-tertiary); }
.rtag.sel { background:var(--text-primary); color:var(--bg-primary); }
.rtag-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.rdiv { border:none; border-top:1px solid var(--border-light); margin:10px 0; }
.rsec { margin-bottom:12px; }
.dim { opacity:.3; pointer-events:none; }

/* 스케줄 토글 */
.sched-toggle-row { display:flex; align-items:center; gap:8px; margin:8px 0 4px; cursor:pointer; user-select:none; }
.sched-toggle-row input[type=checkbox] { display:none; }
.toggle-track { width:32px; height:18px; border-radius:99px; background:var(--border-mid); position:relative; transition:background .2s; flex-shrink:0; cursor:pointer; }
.toggle-track.on { background:var(--accent); }
.toggle-thumb { position:absolute; top:3px; left:3px; width:12px; height:12px; border-radius:50%; background:#fff; transition:transform .2s; }
.toggle-track.on .toggle-thumb { transform:translateX(14px); }
.toggle-label { font-size:12px; color:var(--text-secondary); }
.sched-body { background:var(--bg-tertiary); border-radius:var(--radius-sm); padding:8px 9px; margin-top:4px; }
.sched-body.hidden { display:none; }

/* 반복주기 pills */
.freq-pills { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
.fpill { padding:3px 9px; border-radius:99px; font-size:11px; border:1px solid var(--border-light); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:all .12s; }
.fpill:hover { border-color:var(--border-mid); }
.fpill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.day-pills { display:flex; gap:3px; flex-wrap:wrap; margin-top:2px; }
.dpill { width:27px; height:25px; border-radius:5px; font-size:11px; border:1px solid var(--border-light); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; transition:all .12s; }
.dpill:hover { border-color:var(--border-mid); }
.dpill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.time-row { display:flex; gap:4px; align-items:center; margin-top:6px; }
.time-row select, .time-row .rinput-s { flex:1; height:28px; font-size:12px; padding:0 6px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; font-family:inherit; }
.time-sep { font-size:11px; color:var(--text-tertiary); flex-shrink:0; }
.sched-slbl { font-size:11px; color:var(--text-secondary); margin:6px 0 2px; }

/* 모드 버튼 */
.mbtn { padding:6px 16px; font-size:12px; border:1px solid var(--border-mid); border-radius:var(--radius-md); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; transition:all .12s; font-family:inherit; }
.mbtn:hover { background:var(--bg-tertiary); }
.mbtn.act { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }

/* SVG + 인라인 편집 오버레이 */
svg#mm { position:absolute; inset:0; width:100%; height:100%; }
#inline-editor { display:none; position:absolute; z-index:50; flex-direction:column; align-items:center; gap:6px; }
#inline-editor.visible { display:flex; }
#inline-input { font-size:13px; font-weight:600; font-family:inherit; border:1.5px solid var(--border-mid); border-radius:var(--radius-sm); padding:5px 10px; outline:none; text-align:center; background:#fff; color:var(--text-primary); min-width:100px; max-width:200px; line-height:1.4; resize:none; }
#inline-input:focus { border-color:var(--accent); }
#inline-confirm { padding:4px 14px; font-size:12px; border-radius:var(--radius-md); border:none; background:var(--accent); color:#fff; cursor:pointer; font-family:inherit; white-space:nowrap; }
#inline-confirm:hover { opacity:.85; }
#inline-cancel { padding:4px 10px; font-size:12px; border-radius:var(--radius-md); border:1px solid var(--border-light); background:#fff; color:var(--text-secondary); cursor:pointer; font-family:inherit; }
.inline-btns { display:flex; gap:5px; }

/* 스케줄 오버레이 (월간 토글) */
#sched-overlay { position:absolute; bottom:10px; right:10px; display:none; gap:6px; z-index:10; align-items:center; }
#sched-overlay.visible { display:flex; }
.sov-btn { padding:4px 10px; font-size:11px; border:1px solid var(--border-mid); border-radius:99px; background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; font-family:inherit; }
.sov-btn.on { background:var(--text-primary); color:var(--bg-primary); }
/* 월간 바 */
#monthly-bar { background:var(--bg-secondary); border-top:1px solid var(--border-light); padding:6px 12px; flex-shrink:0; display:none; }
#monthly-bar.visible { display:block; }
#monthly-bar .mb-title { font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
#monthly-bar .mb-items { display:flex; flex-wrap:wrap; gap:6px; }
.mb-chip { display:flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px; font-size:11px; border:1px solid var(--border-light); }
/* 색상 피커 */
.color-picker-box { background:var(--bg-tertiary); border-radius:var(--radius-sm); padding:8px 10px; margin-top:6px; animation:fadeIn .15s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.cprow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.cplbl { font-size:11px; color:var(--text-secondary); width:36px; flex-shrink:0; }
.cpinput { width:36px; height:26px; border:1px solid var(--border-light); border-radius:5px; padding:2px; cursor:pointer; background:var(--bg-primary); }
.cpval { font-size:10px; color:var(--text-tertiary); font-family:monospace; cursor:pointer; text-decoration:underline dotted; }
.cpval:hover { color:var(--text-secondary); }
.rtag-task { padding-left:18px; font-size:11px; opacity:.85; }
#print-modal { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; }
#print-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.55); }
#print-sheet-wrap { position:relative; z-index:1; display:flex; flex-direction:column; width:min(860px,96vw); height:90vh; background:#e8e6e0; border-radius:12px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.3); }
#print-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#fff; border-bottom:1px solid var(--border-light); flex-shrink:0; }
#print-title { font-size:13px; font-weight:600; color:var(--text-primary); }
.ptbtn { padding:6px 16px; font-size:12px; border:1px solid var(--border-mid); border-radius:var(--radius-md); background:#fff; color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:background .12s; }
.ptbtn:hover { background:var(--bg-tertiary); }
.ptbtn.pri { background:var(--text-primary); color:#fff; border-color:var(--text-primary); }
.ptbtn.pri:hover { opacity:.85; }
#print-scroll { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:center; padding:24px; }
#print-a4 { background:#fff; box-shadow:0 4px 24px rgba(0,0,0,.18); border-radius:2px; flex-shrink:0; }
#print-a4 svg { display:block; }
#toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%) translateY(12px); background:#1a1a18; color:#fff; font-size:12px; padding:8px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; white-space:nowrap; z-index:999; }
#toast.toast-show { opacity:1; transform:translateX(-50%) translateY(0); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="left"><div class="ptitle">리스트</div><div id="lscroll"></div></div>
    <div id="center">
      <svg id="mm"></svg>
      <!-- 인라인 편집 오버레이 -->
      <div id="inline-editor">
        <textarea id="inline-input" rows="2"></textarea>
        <div class="inline-btns">
          <button id="inline-confirm" onclick="confirmInlineEdit()">수정</button>
          <button id="inline-cancel" onclick="cancelInlineEdit()">취소</button>
        </div>
      </div>
      <div id="sched-overlay">
        <span style="font-size:11px;color:var(--text-tertiary)">월간 일정</span>
        <button class="sov-btn on" id="sov-bottom" onclick="setMonthlyPos('bottom')">하단</button>
        <button class="sov-btn" id="sov-top" onclick="setMonthlyPos('top')">상단</button>
        <button class="sov-btn" id="sov-hide" onclick="setMonthlyPos('hide')">숨기기</button>
      </div>
    </div>
    <div id="right"><div class="ptitle">편집 툴</div><div id="rscroll"></div></div>
  </div>
  <div id="monthly-bar"><div class="mb-title">월간 일정</div><div class="mb-items" id="monthly-items"></div></div>
  <div id="bottombar">
    <button class="mbtn act" id="mb-expand" onclick="setMode('expand')">확장형</button>
    <button class="mbtn" id="mb-list" onclick="setMode('list')">리스트형</button>
    <button class="mbtn" id="mb-sched" onclick="setMode('sched')">스케줄 모드</button>
    <div style="width:1px;height:20px;background:var(--border-light);margin:0 4px"></div>
    <button class="mbtn" id="undo-btn" onclick="undo()" style="opacity:0.35" disabled title="Ctrl+Z">↩ 되돌리기</button>
  </div>
</div>

<script>

/* ── 팔레트 ── */
const PALETTE={
  0:{l1:'#0C447C',l1bg:'#E6F1FB',l2:'#378ADD',l2bg:'#EEF5FD'},
  1:{l1:'#712B13',l1bg:'#FAECE7',l2:'#D85A30',l2bg:'#FDF3EF'},
  2:{l1:'#085041',l1bg:'#E1F5EE',l2:'#1D9E75',l2bg:'#EDF8F4'},
  3:{l1:'#3C3489',l1bg:'#EEEDFE',l2:'#7F77DD',l2bg:'#F2F2FE'},
  4:{l1:'#633806',l1bg:'#FAEEDA',l2:'#BA7517',l2bg:'#FDF5E8'},
  5:{l1:'#72243E',l1bg:'#FBEAF0',l2:'#D4537E',l2bg:'#FDF0F5'},
  6:{l1:'#3d3d3a',l1bg:'#F1EFE8',l2:'#888780',l2bg:'#F7F6F2'},
};
const EL={0:{ry:62,rx:62},1:{ry:28,rx:54},2:{ry:20,rx:38},3:{ry:13,rx:22}};
const JITTER=[{ar:1,dr:1},{ar:.93,dr:1.07},{ar:1.06,dr:.95},{ar:.97,dr:1.04},{ar:1.05,dr:.98},{ar:.95,dr:1.06},{ar:1.03,dr:.93},{ar:.99,dr:1.03}];
const DAYS_KO=['월','화','수','목','금','토','일'];

function getPal(ci,lv,cc){
  if(cc&&cc.stroke)return cc;
  const p=PALETTE[ci%7];
  return lv===1?{stroke:p.l1,fill:p.l1bg,text:p.l1}:{stroke:p.l2,fill:p.l2bg,text:p.l2};
}
function mixW(hex,r){
  const ri=parseInt(hex.slice(1,3),16),gi=parseInt(hex.slice(3,5),16),bi=parseInt(hex.slice(5,7),16);
  return '#'+[ri,gi,bi].map(v=>Math.round(v+(255-v)*r).toString(16).padStart(2,'0')).join('');
}
function nodePal(n){
  if(n.level<=1||!n.pid)return getPal(n.color,n.level,n.customColors);
  const par=byId(n.pid);
  const sub=par&&par.level===1?par:null;
  if(sub&&sub.customColors&&sub.customColors.stroke){
    const sc=sub.customColors.stroke;
    return{stroke:mixW(sc,.35),fill:mixW(sc,.82),text:mixW(sc,.20)};
  }
  return getPal(n.color,n.level,n.customColors);
}

function emptySchedule(){return{enabled:false,type:'daily',days:[],startHour:9,duration:1};}
function emptyNode(id,pid,level,color){return{id,pid,text:'',level,memo:'',color,x:0,y:0,schedule:emptySchedule(),customColors:null};}
function blankNodes(){return[emptyNode(1,null,0,0),emptyNode(2,1,1,0),emptyNode(3,1,1,1),emptyNode(4,2,2,0)];}

/* ── 상태 ── */
let seq=10,selected=null,mode='expand',monthlyPos='bottom';
let editSched=emptySchedule(),newSched=emptySchedule();
let inlineNodeId=null;
let pendingColors={};

/* 팬/줌 */
let vx=0,vy=0,vscale=1;
let dragNode=null,dragOX=0,dragOY=0,didDrag=false;
let isPanning=false,panLast={x:0,y:0};
let pinchStartDist=0,pinchStartScale=1;

/* 히스토리 */
const history=[];
function saveHistory(){history.push(JSON.stringify(nodes));if(history.length>30)history.shift();updateUndoBtn();}
function undo(){if(!history.length)return;nodes=JSON.parse(history.pop());selected=null;cancelInlineEdit();updateUndoBtn();render();showToast('↩ 되돌렸어요');}
function updateUndoBtn(){const b=document.getElementById('undo-btn');if(b){b.disabled=history.length===0;b.style.opacity=history.length===0?'0.35':'1';}}
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}t.textContent=msg;t.className='toast-show';clearTimeout(t._timer);t._timer=setTimeout(()=>{t.className='';},2200);}

/* ── 파일 관리 ── */
const LS_KEY='nodi_files',LS_CUR='nodi_current',AUTO_KEY='nodi_autosave';
let currentFileId=null;
function loadFileList(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];}}
function saveFileList(list){localStorage.setItem(LS_KEY,JSON.stringify(list));}
function toggleFilePanel(){
  const wrap=document.getElementById('file-list-wrap'),arrow=document.getElementById('file-panel-arrow');
  const open=wrap.classList.toggle('open');arrow.classList.toggle('open',open);
  if(open)renderFileList();
}
function renderFileList(){
  const list=loadFileList(),el=document.getElementById('file-list');
  if(!list.length){el.innerHTML='<div style="font-size:11px;color:var(--text-tertiary);padding:6px 7px">저장된 파일 없음</div>';return;}
  el.innerHTML='';
  list.slice().reverse().forEach(f=>{
    const it=document.createElement('div');it.className='fitem'+(f.id===currentFileId?' active':'');
    it.innerHTML=`<span style="font-size:12px">📄</span><span class="fitem-name" title="${f.name}">${f.name}</span><button class="fitem-del" onclick="deleteFile('${f.id}',event)">✕</button>`;
    it.addEventListener('click',()=>loadFile(f.id));el.appendChild(it);
  });
}
function saveCurrentFile(){
  const root=nodes.find(n=>n.level===0);
  const defaultName=root&&root.text?root.text.replace('\n',' '):'새 작업';
  const name=prompt('파일 이름',currentFileId?(loadFileList().find(f=>f.id===currentFileId)?.name||defaultName):defaultName);
  if(!name)return;
  const list=loadFileList(),data={nodes:JSON.parse(JSON.stringify(nodes)),seq,vx,vy,vscale};
  if(currentFileId){const idx=list.findIndex(f=>f.id===currentFileId);if(idx>=0){list[idx].name=name;list[idx].data=data;list[idx].updated=Date.now();}else{list.push({id:currentFileId,name,data,created:Date.now(),updated:Date.now()});}}
  else{currentFileId='f'+Date.now();list.push({id:currentFileId,name,data,created:Date.now(),updated:Date.now()});}
  saveFileList(list);localStorage.setItem(LS_CUR,currentFileId);showToast('💾 "'+name+'" 저장됐어요');renderFileList();
}
function loadFile(id){
  const list=loadFileList(),f=list.find(x=>x.id===id);if(!f)return;
  if(!confirm('"'+f.name+'" 불러올까요?'))return;
  nodes=JSON.parse(JSON.stringify(f.data.nodes));seq=f.data.seq||10;
  vx=f.data.vx||0;vy=f.data.vy||0;vscale=f.data.vscale||1;
  currentFileId=id;localStorage.setItem(LS_CUR,id);selected=null;
  nodes.forEach(n=>n._dragged=false);showToast('📂 "'+f.name+'" 불러왔어요');renderFileList();render();
}
function deleteFile(id,e){
  e.stopPropagation();const list=loadFileList(),f=list.find(x=>x.id===id);if(!f)return;
  if(!confirm('"'+f.name+'" 삭제?'))return;
  saveFileList(list.filter(x=>x.id!==id));if(currentFileId===id)currentFileId=null;
  showToast('🗑 삭제됐어요');renderFileList();
}
function newFile(){
  if(!confirm('새 작업 시작? 현재 작업을 먼저 저장해주세요.'))return;
  currentFileId=null;localStorage.removeItem(LS_CUR);
  seq=10;vx=0;vy=0;vscale=1;selected=null;nodes=blankNodes();
  showToast('✨ 새 작업 시작');renderFileList();render();
}

/* ── 노드 데이터 초기화 ── */
let nodes=blankNodes();
(function restoreSession(){
  try{
    const lastId=localStorage.getItem(LS_CUR);
    if(!lastId)return;
    const list=JSON.parse(localStorage.getItem(LS_KEY)||'[]');
    const f=list.find(x=>x.id===lastId);if(!f)return;
    nodes=JSON.parse(JSON.stringify(f.data.nodes));
    seq=f.data.seq||10;vx=f.data.vx||0;vy=f.data.vy||0;vscale=f.data.vscale||1;
    currentFileId=lastId;
  }catch(e){}
})();

/* ── 유틸 ── */
function kids(pid){return nodes.filter(n=>n.pid===pid);}
function byId(id){return nodes.find(n=>n.id===id);}
function rootColor(n){if(n.level<=1)return n.color;const p=byId(n.pid);return p?rootColor(p):0;}
function getSubtreeOffsets(node,dx,dy){kids(node.id).forEach(c=>{c.x+=dx;c.y+=dy;c._dragged=true;getSubtreeOffsets(c,dx,dy);});}

/* ── 스케줄 ── */
function schedLabel(s){
  if(!s||!s.enabled)return'';
  const tm={daily:'매일',weekdays:'평일',weekend:'주말',weekly:'요일',biweekly:'격주',monthly:'매월'};
  let str=tm[s.type]||s.type;
  if((s.type==='weekly'||s.type==='biweekly')&&s.days&&s.days.length)str+=' '+s.days.map(d=>DAYS_KO[d]).join(', ');
  if(s.type==='monthly'&&s.monthlyCount)str+=` ${s.monthlyCount}회`;
  if(s.startHour!=null)str+=` ${String(s.startHour).padStart(2,'0')}:00`;
  if(s.duration&&s.duration>1)str+=`~${String(s.startHour+s.duration).padStart(2,'0')}:00`;
  return str;
}
function schedToDays(s){
  if(!s||!s.enabled)return[];
  if(s.type==='daily')return[0,1,2,3,4,5,6];
  if(s.type==='weekdays')return[0,1,2,3,4];
  if(s.type==='weekend')return[5,6];
  if(s.type==='weekly'||s.type==='biweekly')return s.days||[];
  return[];
}

/* ── SVG 헬퍼 ── */
const sv=document.getElementById('mm');
function cw(){return document.getElementById('center').offsetWidth||600;}
function ch(){return document.getElementById('center').offsetHeight||700;}
function mkEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;
}

/* ── 팬/줌 변환 ── */
function clientToCanvas(cx,cy){
  const rect=document.getElementById('center').getBoundingClientRect();
  return{x:(cx-rect.left-vx)/vscale,y:(cy-rect.top-vy)/vscale};
}
function applyTransform(){
  const g=document.getElementById('mm-world');
  if(g)g.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
}

/* ── 레이아웃: 겹치지 않게, 노드 크기 감안 ── */
function autoLayout(){
  const root=nodes.find(n=>n.level===0);
  if(!root)return;
  root.x=cw()/2;root.y=ch()/2;
  const subs=kids(root.id);
  const N=subs.length||1;
  /* 부메인 반경: 메인 반경(62) + 부메인 반경(54) + 여유(40) */
  const subR=62+54+40;
  subs.forEach((sub,i)=>{
    if(sub._dragged)return;
    const a=(i/N)*Math.PI*2-Math.PI/2+(i%2===0?.08:-.08);
    sub.x=root.x+Math.cos(a)*subR;
    sub.y=root.y+Math.sin(a)*subR;
    const tasks=kids(sub.id);
    const T=tasks.length||1;
    /* 하위 노드 반경: 부메인 반경(54) + 하위 반경(38) + 여유(30) */
    const taskR=54+38+30;
    const fanSpan=Math.min(Math.PI*0.8,T*0.5);
    tasks.forEach((task,ti)=>{
      if(task._dragged)return;
      const ta=a+(ti-(T-1)/2)*(fanSpan/Math.max(T-1,1));
      task.x=sub.x+Math.cos(ta)*taskR;
      task.y=sub.y+Math.sin(ta)*taskR;
    });
  });
}

/* ── 확장형 렌더 ── */
function applyTransformExpand(){
  const g=document.getElementById('mm-world');
  if(g)g.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
}
function renderExpand(){
  sv.innerHTML='';
  const world=document.createElementNS('http://www.w3.org/2000/svg','g');
  world.id='mm-world';
  world.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
  sv.appendChild(world);
  autoLayout();
  const root=nodes.find(n=>n.level===0);if(!root)return;
  function drawTree(node){
    kids(node.id).forEach(c=>{
      const pal=nodePal(c);
      drawCurve(world,node.x,node.y,c.x,c.y,pal.stroke,node.level===0?1.8:1.1,node.level===0?.45:.28,c.id);
      drawTree(c);drawNodeEl(world,c);
    });
  }
  drawTree(root);drawCenter(world,root);
}
function drawCurve(container,x1,y1,x2,y2,color,sw,op,seed){
  const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  const s=(seed%2===0?1:-1),ox=(-dy/len)*s*len*.08,oy=(dx/len)*s*len*.08;
  container.appendChild(mkEl('path',{d:`M${x1} ${y1} Q${mx+ox} ${my+oy} ${x2} ${y2}`,fill:'none',stroke:color,'stroke-width':sw,opacity:op,'stroke-linecap':'round'}));
}
function drawCenter(container,n){
  const cc=n.customColors,bg=cc&&cc.fill?cc.fill:'#1a1a18',tc=cc&&cc.text?cc.text:'#ffffff';
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.appendChild(mkEl('circle',{cx:n.x,cy:n.y,r:62,fill:bg}));
  n.text.split('\n').forEach((ln,i,a)=>{
    const t=mkEl('text',{x:n.x,y:n.y+(i-(a.length-1)/2)*20,'text-anchor':'middle','dominant-baseline':'central',fill:tc,'font-size':'16','font-weight':'600'});
    t.textContent=ln;g.appendChild(t);
  });
  container.appendChild(g);
  g.style.cursor='default';
  let lastTap=0;
  g.addEventListener('click',()=>selectNode(n.id));
  g.addEventListener('dblclick',()=>openInlineEditor(n));
  g.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<320){openInlineEditor(n);e.preventDefault();}else selectNode(n.id);lastTap=now;});
}
function drawNodeEl(container,n){
  const pal=nodePal(n),E=EL[n.level]||EL[3],rx=E.rx,ry=E.ry,isSel=selected===n.id;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.style.cursor='grab';
  g.appendChild(mkEl('ellipse',{cx:n.x,cy:n.y,rx,ry,fill:isSel?pal.stroke:pal.fill,stroke:pal.stroke,'stroke-width':isSel?0:1}));
  const fs=n.level===1?13:n.level===2?11:9;
  n.text.split('\n').forEach((ln,i,a)=>{
    const t=mkEl('text',{x:n.x,y:n.y+(i-(a.length-1)/2)*(fs+2),'text-anchor':'middle','dominant-baseline':'central',fill:isSel?'#fff':pal.text,'font-size':fs,'font-weight':'600'});
    t.textContent=ln;g.appendChild(t);
  });
  const topY=n.y-ry,lbl=schedLabel(n.schedule);
  if(lbl){const ft=mkEl('text',{x:n.x,y:topY-12,'text-anchor':'middle','dominant-baseline':'central',fill:pal.stroke,'font-size':'9'});ft.textContent=lbl;g.appendChild(ft);}
  if(n.memo){
    n.memo.split('/').map(s=>s.trim()).forEach((ml,mi,arr)=>{
      const mx2=n.x+rx+8,my2=n.y+(mi-(arr.length-1)/2)*17,mw=Math.min(ml.length*7+14,130),mh=15;
      container.appendChild(mkEl('rect',{x:mx2,y:my2-mh/2,width:mw,height:mh,rx:'5',fill:pal.fill,stroke:pal.stroke,'stroke-width':'0.5'}));
      const mt=mkEl('text',{x:mx2+6,y:my2,'dominant-baseline':'central',fill:pal.text,'font-size':'9'});
      mt.textContent=ml.length>16?ml.slice(0,15)+'…':ml;container.appendChild(mt);
    });
  }
  let lastTap=0;
  g.addEventListener('mousedown',e=>startDrag(e,n));
  g.addEventListener('touchstart',e=>{if(e.touches.length===1)startDrag(e,n);},{passive:true});
  g.addEventListener('dblclick',e=>{e.stopPropagation();openInlineEditor(n);});
  g.addEventListener('touchend',e=>{
    const now=Date.now();
    if(now-lastTap<320&&!didDrag){openInlineEditor(n);e.preventDefault();}
    else if(!didDrag)selectNode(n.id);
    lastTap=now;
  });
  g.addEventListener('click',()=>{if(!didDrag)selectNode(n.id);});
  container.appendChild(g);
}

/* ── 드래그 ── */
function getPos(e){
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
function startDrag(e,n){
  didDrag=false;dragNode=n;
  const p=getPos(e),cp=clientToCanvas(p.x,p.y);
  dragOX=cp.x-n.x;dragOY=cp.y-n.y;
  e.stopPropagation();
  if(e.type==='mousedown')e.preventDefault();
}
function moveDrag(cx,cy){
  if(!dragNode||mode!=='expand')return;
  didDrag=true;
  const cp=clientToCanvas(cx,cy);
  const nx=cp.x-dragOX,ny=cp.y-dragOY;
  const dx=nx-dragNode.x,dy=ny-dragNode.y;
  dragNode.x=nx;dragNode.y=ny;dragNode._dragged=true;
  if(dragNode.level===1)getSubtreeOffsets(dragNode,dx,dy);
  applyTransformExpand();
  /* 선만 업데이트 */
  renderExpand();
}

/* 마우스 이벤트 */
sv.addEventListener('mousedown',e=>{
  if(dragNode||mode!=='expand')return;
  isPanning=true;panLast={x:e.clientX,y:e.clientY};e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(dragNode){moveDrag(e.clientX,e.clientY);return;}
  if(!isPanning||mode!=='expand')return;
  vx+=e.clientX-panLast.x;vy+=e.clientY-panLast.y;
  panLast={x:e.clientX,y:e.clientY};applyTransform();
});
document.addEventListener('mouseup',()=>{dragNode=null;isPanning=false;});

/* 터치 이벤트 */
sv.addEventListener('touchstart',e=>{
  if(mode!=='expand')return;
  if(e.touches.length===2){
    dragNode=null;isPanning=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchStartDist=Math.sqrt(dx*dx+dy*dy);pinchStartScale=vscale;
  }else if(!dragNode){
    isPanning=true;panLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&mode==='expand'){
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    vscale=Math.max(0.3,Math.min(3,pinchStartScale*(dist/pinchStartDist)));
    applyTransform();return;
  }
  if(dragNode&&mode==='expand'){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);return;}
  if(!isPanning||mode!=='expand')return;
  e.preventDefault();
  vx+=e.touches[0].clientX-panLast.x;vy+=e.touches[0].clientY-panLast.y;
  panLast={x:e.touches[0].clientX,y:e.touches[0].clientY};applyTransform();
},{passive:false});
document.addEventListener('touchend',()=>{dragNode=null;isPanning=false;});
document.addEventListener('touchcancel',()=>{dragNode=null;isPanning=false;});

/* 휠 줌 */
sv.addEventListener('wheel',e=>{
  if(mode!=='expand')return;e.preventDefault();
  const rect=document.getElementById('center').getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const ns=Math.max(0.3,Math.min(3,vscale*(e.deltaY>0?.9:1.1)));
  vx=mx-(mx-vx)*(ns/vscale);vy=my-(my-vy)*(ns/vscale);vscale=ns;applyTransform();
},{passive:false});

/* ── 뷰 초기화 ── */
function resetView(){vx=0;vy=0;vscale=1;nodes.forEach(n=>n._dragged=false);render();}

/* ── 노디 이동 정리 ── */
function nodiArrange(){
  const root=nodes.find(n=>n.level===0);
  const subs=kids(root.id);const N=subs.length;if(!N)return;
  const subR=62+54+40;
  subs.forEach((sub,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    sub.x=root.x+Math.cos(a)*subR;sub.y=root.y+Math.sin(a)*subR;sub._dragged=true;
    const tasks=kids(sub.id);const T=tasks.length;
    if(!T)return;
    const taskR=54+38+30;
    const fanSpan=Math.min(Math.PI*0.8,T*0.5);
    tasks.forEach((task,ti)=>{
      const ta=a+(ti-(T-1)/2)*(fanSpan/Math.max(T-1,1));
      task.x=sub.x+Math.cos(ta)*taskR;task.y=sub.y+Math.sin(ta)*taskR;task._dragged=true;
    });
  });
  showToast('🔵 노디가 정리했어요');renderExpand();
}

/* ── 인라인 편집 ── */
function openInlineEditor(n){
  cancelInlineEdit();inlineNodeId=n.id;
  const editor=document.getElementById('inline-editor'),input=document.getElementById('inline-input');
  input.value=n.text.replace('\n',' ');
  const E=EL[n.level]||EL[3];
  const rect=document.getElementById('center').getBoundingClientRect();
  /* 노드 화면 위치: 캔버스 좌표 → 화면 좌표 */
  const sx=n.x*vscale+vx,sy=(n.y-E.ry-10)*vscale+vy;
  editor.style.left=sx+'px';editor.style.top=sy+'px';editor.style.transform='translateX(-50%)';
  editor.classList.add('visible');input.focus();input.select();
}
function confirmInlineEdit(){
  if(!inlineNodeId)return;const n=byId(inlineNodeId);
  const val=document.getElementById('inline-input').value.trim();
  if(val&&val!==n.text.replace('\n',' ')){saveHistory();n.text=val;showToast('✓ 수정됐어요');}
  cancelInlineEdit();render();
}
function cancelInlineEdit(){inlineNodeId=null;document.getElementById('inline-editor').classList.remove('visible');}
document.getElementById('inline-input').addEventListener('keydown',e=>{if(e.key==='Escape')cancelInlineEdit();});

/* ── 선택 ── */
function selectNode(id){
  selected=id;pendingColors={};
  const n=byId(id);
  if(n&&n.schedule)editSched={...n.schedule,days:[...(n.schedule.days||[])]};
  else editSched=emptySchedule();
  render();
}

/* ── 스케줄 모드 ── */
function renderSched(){
  sv.innerHTML='';
  const W=cw(),H=ch(),H_START=6,H_END=24,padL=40,padT=28,colW=Math.floor((W-padL)/7),gridH=H-padT-6,hPx=gridH/(H_END-H_START);
  DAYS_KO.forEach((d,i)=>{
    const x=padL+i*colW+colW/2;
    const hdr=mkEl('text',{x,y:14,'text-anchor':'middle','dominant-baseline':'central',fill:'#555550','font-size':'11','font-weight':'600'});
    hdr.textContent=d;sv.appendChild(hdr);
    sv.appendChild(mkEl('rect',{x:padL+i*colW+1,y:padT,width:colW-2,height:gridH,rx:'4',fill:i>=5?'#f7f6f3':'#ffffff',stroke:'#e2dfd8','stroke-width':'0.8'}));
  });
  for(let h=H_START;h<=H_END;h+=2){
    const y=padT+(h-H_START)*hPx;
    const sl=mkEl('text',{x:padL-5,y,'text-anchor':'end','dominant-baseline':'central',fill:'#999890','font-size':'9'});
    sl.textContent=`${String(h).padStart(2,'0')}:00`;sv.appendChild(sl);
    if(h>H_START)sv.appendChild(mkEl('line',{x1:padL,y1:y,x2:W,y2:y,stroke:'#e2dfd8','stroke-width':'0.5','stroke-dasharray':h%6===0?'':'3,3'}));
  }
  const cc=Array.from({length:7},()=>[]);
  nodes.filter(n=>n.level===2&&n.schedule&&n.schedule.enabled&&n.schedule.type!=='monthly').forEach(task=>{
    const pal=nodePal(task),s=task.schedule,dd=schedToDays(s);
    dd.forEach(di=>{
      const sh=Math.max(s.startHour,H_START),eh=Math.min(s.startHour+(s.duration||1),H_END);
      const y=padT+(sh-H_START)*hPx,bh=(eh-sh)*hPx-2;
      const overlap=cc[di].filter(b=>b.sh<eh&&b.eh>sh).length;
      const bw=Math.max(colW-10-overlap*4,20),bx=padL+di*colW+3+overlap*4;
      cc[di].push({sh,eh});
      sv.appendChild(mkEl('rect',{x:bx,y,width:bw,height:Math.max(bh,14),rx:'4',fill:pal.fill,stroke:pal.stroke,'stroke-width':'0.7'}));
      const bt=mkEl('text',{x:bx+5,y:y+Math.max(bh,14)/2,'dominant-baseline':'central',fill:pal.text,'font-size':'9.5','font-weight':'500'});
      bt.textContent=task.text.length>7?task.text.slice(0,6)+'…':task.text;sv.appendChild(bt);
    });
  });
}

/* ── 월간 바 ── */
function renderMonthlyBar(){
  const bar=document.getElementById('monthly-bar'),items=document.getElementById('monthly-items');
  if(mode!=='sched'||monthlyPos==='hide'){bar.classList.remove('visible');return;}
  const monthly=nodes.filter(n=>n.level===2&&n.schedule&&n.schedule.enabled&&n.schedule.type==='monthly');
  if(!monthly.length){bar.classList.remove('visible');return;}
  bar.classList.add('visible');items.innerHTML='';
  monthly.forEach(task=>{
    const pal=nodePal(task);
    const chip=document.createElement('div');chip.className='mb-chip';
    chip.style.cssText=`border-color:${pal.stroke};color:${pal.text};background:${pal.fill}`;
    chip.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${pal.stroke};flex-shrink:0;display:inline-block"></span>${task.text||''}<span style="opacity:.7;font-size:10px">${schedLabel(task.schedule)}</span>`;
    items.appendChild(chip);
  });
  bar.style.order=monthlyPos==='top'?'-1':'';
}
function setMonthlyPos(pos){monthlyPos=pos;['bottom','top','hide'].forEach(p=>document.getElementById('sov-'+p).classList.toggle('on',p===pos));renderMonthlyBar();}

/* ── 좌측 리스트 ── */
let listDrag={active:false,nodeId:null,level:null,srcEl:null,overNodeId:null,dropBefore:true};
function renderLeft(){
  const area=document.getElementById('lscroll');area.innerHTML='';
  const root=nodes.find(n=>n.level===0);if(!root)return;
  const subs=kids(root.id);

  mainEl.onclick=()=>selectNode(root.id);area.appendChild(mainEl);
  subs.forEach(sub=>{

    header.draggable=true;

    const taskList=document.createElement('div');taskList.className='ltask-list';taskList.dataset.parentId=sub.id;
    kids(sub.id).forEach(task=>{

      it.innerHTML=`<span class="ldrag-handle">⠿</span><span class="l-task-prefix">└</span><span class="l-task-dot" style="background:${tp.stroke}"></span><div style="flex:1;min-width:0"><div class="ltext">${task.text||'(미입력)'}</div><div class="lbadge">${schedLabel(task.schedule)||'일정 없음'}</div>${task.memo?`<div class="lbadge" style="font-style:italic">${task.memo.replace(/\//g,', ')}</div>`:''}</div>`;
      it.addEventListener('click',()=>selectNode(task.id));
      it.addEventListener('dragstart',e=>startListDrag(e,task.id,2,it));
      it.addEventListener('dragend',()=>endListDrag());
      it.addEventListener('dragover',e=>onListDragOver(e,task.id,2,it));
      it.addEventListener('drop',e=>onListDrop(e,task.id,2));

    });
    taskList.addEventListener('dragover',e=>{if(listDrag.level===2)e.preventDefault();});

function startListDrag(e,nodeId,level,el){listDrag={active:true,nodeId,level,srcEl:el};e.dataTransfer.effectAllowed='move';el.style.opacity='0.45';}
function endListDrag(){if(listDrag.srcEl)listDrag.srcEl.style.opacity='';document.querySelectorAll('.ldrop-line').forEach(e=>e.classList.remove('ldrop-line'));listDrag={active:false,nodeId:null,level:null,srcEl:null};}
function onListDragOver(e,overId,level,el){
  if(!listDrag.active||listDrag.level!==level||listDrag.nodeId===overId)return;
  e.preventDefault();document.querySelectorAll('.ldrop-line').forEach(x=>x.classList.remove('ldrop-line'));
  el.classList.add('ldrop-line');
  listDrag.dropBefore=e.clientY<el.getBoundingClientRect().top+el.getBoundingClientRect().height/2;
  listDrag.overNodeId=overId;
}
function onListDrop(e,overId,level,fallbackPid){
  e.preventDefault();if(!listDrag.active||listDrag.level!==level)return;
  const dragId=listDrag.nodeId;if(dragId===overId)return;
  saveHistory();
  if(level===1){
    const root=nodes.find(n=>n.level===0),subs=kids(root.id);
    const ai=subs.findIndex(n=>n.id===dragId),bi=subs.findIndex(n=>n.id===overId);
    if(ai<0||bi<0)return;
    const aIdx=nodes.indexOf(subs[ai]),bIdx=nodes.indexOf(subs[bi]);
    [nodes[aIdx],nodes[bIdx]]=[nodes[bIdx],nodes[aIdx]];
  }else{
    const dn=byId(dragId);if(!dn)return;
    if(overId===null){if(fallbackPid)dn.pid=fallbackPid;}
    else{
      const on=byId(overId);if(!on)return;
      const di=nodes.indexOf(dn);nodes.splice(di,1);
      const newOi=nodes.indexOf(on);
      nodes.splice(listDrag.dropBefore?newOi:newOi+1,0,dn);
      dn.pid=on.pid;
    }
  }
  render();
}

function toggleSchedEnabled(prefix){

function setSchedType(prefix,val){

function toggleSchedDay(prefix,idx){

/* ── 인쇄 ── */
function openPrintPreview(){
  const isLandscape=mode==='expand';
  const A4W=isLandscape?1123:794,A4H=isLandscape?794:1123;
  const root=nodes.find(n=>n.level===0);if(!root)return;
  let svgContent='';
  if(mode==='expand'){
    autoLayout();
    const allN=nodes.filter(n=>n.x||n.y);
    if(!allN.length)return;
    const xs=allN.map(n=>n.x),ys=allN.map(n=>n.y);
    const minX=Math.min(...xs)-90,maxX=Math.max(...xs)+90,minY=Math.min(...ys)-90,maxY=Math.max(...ys)+90;
    const cW=maxX-minX,cH=maxY-minY;
    const scale=Math.min((A4W-80)/cW,(A4H-80)/cH,1.5);
    const offX=(A4W-cW*scale)/2-minX*scale,offY=(A4H-cH*scale)/2-minY*scale;
    let edges='',nodesStr='';
    function edgesFor(node){kids(node.id).forEach(c=>{const pal=nodePal(c);const mx=(node.x+c.x)/2,my=(node.y+c.y)/2,dx=c.x-node.x,dy=c.y-node.y,len=Math.sqrt(dx*dx+dy*dy)||1;const s=(c.id%2===0?1:-1),ox=(-dy/len)*s*len*.08,oy=(dx/len)*s*len*.08;edges+=`<path d="M${node.x} ${node.y} Q${mx+ox} ${my+oy} ${c.x} ${c.y}" fill="none" stroke="${pal.stroke}" stroke-width="${node.level===0?1.8:1.1}" opacity="${node.level===0?.45:.28}" stroke-linecap="round"/>`;edgesFor(c);});}
    edgesFor(root);
    function nodesFor(node){
      if(node.level===0){const cc=node.customColors;nodesStr+=`<circle cx="${node.x}" cy="${node.y}" r="62" fill="${cc?.fill||'#1a1a18'}"/>`;node.text.split('\n').forEach((ln,i,a)=>{nodesStr+=`<text x="${node.x}" y="${node.y+(i-(a.length-1)/2)*20}" text-anchor="middle" dominant-baseline="central" fill="${cc?.text||'#fff'}" font-size="16" font-weight="600" font-family="sans-serif">${ln}</text>`;});return;}
      const pal=nodePal(node),E=EL[node.level]||EL[3];
      nodesStr+=`<ellipse cx="${node.x}" cy="${node.y}" rx="${E.rx}" ry="${E.ry}" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="1"/>`;
      const fs=node.level===1?13:11;
      node.text.split('\n').forEach((ln,i,a)=>{nodesStr+=`<text x="${node.x}" y="${node.y+(i-(a.length-1)/2)*(fs+2)}" text-anchor="middle" dominant-baseline="central" fill="${pal.text}" font-size="${fs}" font-weight="600" font-family="sans-serif">${ln}</text>`;});
      kids(node.id).forEach(c=>nodesFor(c));
    }
    nodes.filter(n=>n.level>0).forEach(n=>nodesFor(n));nodesFor(root);
    svgContent=`<g transform="translate(${offX},${offY}) scale(${scale})">${edges}${nodesStr}</g>`;
  }else if(mode==='list'){
    let y=60,out='';
    out+=`<text x="${A4W/2}" y="${y}" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a18" font-family="sans-serif">${root.text||''}</text>`;y+=38;
    out+=`<line x1="50" y1="${y}" x2="${A4W-50}" y2="${y}" stroke="#ccc9c0" stroke-width="1"/>`;y+=22;
    kids(root.id).forEach(sub=>{
      const pal=nodePal(sub);
      out+=`<rect x="50" y="${y-2}" width="${A4W-100}" height="28" rx="6" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="0.8"/>`;
      out+=`<text x="63" y="${y+13}" fill="${pal.text}" font-size="14" font-weight="600" dominant-baseline="central" font-family="sans-serif">${sub.text||''}</text>`;y+=36;
      kids(sub.id).forEach(task=>{
        const tp=nodePal(task);
        out+=`<text x="74" y="${y+8}" fill="${tp.text}" font-size="12" font-weight="500" dominant-baseline="central" font-family="sans-serif">· ${task.text||''}</text>`;
        const lbl=schedLabel(task.schedule);if(lbl){out+=`<text x="${A4W-60}" y="${y+8}" fill="${tp.text}" font-size="10" text-anchor="end" dominant-baseline="central" opacity=".75" font-family="sans-serif">${lbl}</text>`;}
        y+=22;if(task.memo){task.memo.split('/').forEach(m=>{out+=`<text x="90" y="${y+5}" fill="#999890" font-size="10" dominant-baseline="central" font-family="sans-serif">→ ${m.trim()}</text>`;y+=17;});}y+=4;
      });y+=10;
    });
    svgContent=out;
  }else{
    const H_START=6,H_END=24,padL=46,padT=48,colW=Math.floor((A4W-padL)/7),gridH=A4H-padT-80,hPx=gridH/(H_END-H_START);
    let out=`<text x="${A4W/2}" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a18" font-family="sans-serif">${root.text||''} — 주간 스케줄</text>`;
    DAYS_KO.forEach((d,i)=>{const x=padL+i*colW+colW/2;out+=`<text x="${x}" y="${padT-10}" text-anchor="middle" font-size="11" font-weight="600" fill="#555550" font-family="sans-serif">${d}</text><rect x="${padL+i*colW+1}" y="${padT}" width="${colW-2}" height="${gridH}" rx="4" fill="${i>=5?'#f7f6f3':'#ffffff'}" stroke="#e2dfd8" stroke-width="0.8"/>`;});
    for(let h=H_START;h<=H_END;h+=2){const y=padT+(h-H_START)*hPx;out+=`<text x="${padL-5}" y="${y}" text-anchor="end" dominant-baseline="central" fill="#999890" font-size="8" font-family="sans-serif">${String(h).padStart(2,'0')}:00</text>`;if(h>H_START)out+=`<line x1="${padL}" y1="${y}" x2="${A4W}" y2="${y}" stroke="#e2dfd8" stroke-width="0.5" stroke-dasharray="${h%6===0?'':'3,3'}"/>`;}
    const cc=Array.from({length:7},()=>[]);
    nodes.filter(n=>n.level===2&&n.schedule&&n.schedule.enabled&&n.schedule.type!=='monthly').forEach(task=>{
      const pal=nodePal(task),s=task.schedule,dd=schedToDays(s);
      dd.forEach(di=>{const sh=Math.max(s.startHour,H_START),eh=Math.min(s.startHour+(s.duration||1),H_END),y=padT+(sh-H_START)*hPx,bh=(eh-sh)*hPx-2,overlap=cc[di].filter(b=>b.sh<eh&&b.eh>sh).length,bw=Math.max(colW-10-overlap*4,20),bx=padL+di*colW+3+overlap*4;cc[di].push({sh,eh});out+=`<rect x="${bx}" y="${y}" width="${bw}" height="${Math.max(bh,14)}" rx="4" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="0.7"/><text x="${bx+5}" y="${y+Math.max(bh,14)/2}" dominant-baseline="central" fill="${pal.text}" font-size="9" font-weight="500" font-family="sans-serif">${task.text.length>7?task.text.slice(0,6)+'…':task.text}</text>`;});
    });
    svgContent=out;
  }
  const existing=document.getElementById('print-modal');if(existing)existing.remove();
  const modal=document.createElement('div');modal.id='print-modal';
  modal.innerHTML=`<div id="print-backdrop" onclick="closePrintPreview()"></div><div id="print-sheet-wrap"><div id="print-toolbar"><span id="print-title">인쇄 미리보기 — ${mode==='expand'?'확장형 (가로)':mode==='list'?'리스트형':'스케줄 모드'}</span><div style="display:flex;gap:8px"><button class="ptbtn" onclick="closePrintPreview()">닫기</button><button class="ptbtn pri" onclick="doPrint(${isLandscape})">🖨 인쇄</button></div></div><div id="print-scroll"><div id="print-a4"><svg id="print-svg" xmlns="http://www.w3.org/2000/svg" width="${A4W}" height="${A4H}" viewBox="0 0 ${A4W} ${A4H}"><rect width="${A4W}" height="${A4H}" fill="white"/>${svgContent}</svg></div></div></div>`;
  document.body.appendChild(modal);
}
function closePrintPreview(){const m=document.getElementById('print-modal');if(m)m.remove();}
function doPrint(landscape){
  const svg=document.getElementById('print-svg');if(!svg)return;
  const svgStr=new XMLSerializer().serializeToString(svg);
  const win=window.open('','_blank','width=1000,height=800');
  const w=landscape?'297mm':'210mm',h=landscape?'210mm':'297mm';
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@page{size:${landscape?'A4 landscape':'A4'};margin:0;}body{margin:0;padding:0;}img{width:${w};height:${h};display:block;}</style></head><body>`);
  const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  win.document.write(`<img src="${url}" onload="window.print();URL.revokeObjectURL('${url}')"/>`);
  win.document.write('</body></html>');win.document.close();
}

/* ── 렌더 ── */
function render(){
  if(mode==='expand')renderExpand();
  else if(mode==='list')renderList();
  else renderSched();
  renderLeft();renderRight();
  document.getElementById('sched-overlay').classList.toggle('visible',mode==='sched');
  renderMonthlyBar();
}
function setMode(m){
  mode=m;selected=null;cancelInlineEdit();
  ['expand','list','sched'].forEach(x=>document.getElementById('mb-'+x).classList.toggle('act',x===m));
  render();
}

/* ── 자동 저장 ── */
const AUTO_SAVE_MS=10*60*1000;
function autoSave(){
  const data={nodes:JSON.parse(JSON.stringify(nodes)),seq,vx,vy,vscale,savedAt:Date.now()};
  try{localStorage.setItem(AUTO_KEY,JSON.stringify(data));const el=document.getElementById('autosave-indicator');if(el){const t=new Date();el.textContent='● 자동저장 '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');el.style.opacity='1';setTimeout(()=>{el.style.opacity='0.45';},2000);}}catch(e){}
}
setInterval(autoSave,AUTO_SAVE_MS);

window.addEventListener('resize',()=>render());
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}if(e.key==='Escape')cancelInlineEdit();});
render();

</script>
