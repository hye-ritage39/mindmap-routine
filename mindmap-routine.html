<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루틴 마인드맵</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f6f3; --bg-tertiary:#efede8;
  --border-light:#e2dfd8; --border-mid:#ccc9c0;
  --text-primary:#1a1a18; --text-secondary:#555550; --text-tertiary:#999890;
  --danger:#A32D2D; --danger-border:#F09595;
  --accent:#1a1a18;
  --radius-sm:6px; --radius-md:8px;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
}
body { background:var(--bg-secondary); color:var(--text-primary); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100vh; }
#main { display:flex; flex:1; overflow:hidden; min-width:0; }
#left  { width:160px; flex-shrink:0; background:var(--bg-secondary); border-right:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
#center{ flex:1; min-width:0; position:relative; background:var(--bg-primary); overflow:hidden; }
#right { width:210px; flex-shrink:0; background:var(--bg-secondary); border-left:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
#bottombar { height:48px; background:var(--bg-secondary); border-top:1px solid var(--border-light); display:flex; align-items:center; justify-content:center; gap:8px; flex-shrink:0; }

/* 패널 타이틀 */
.ptitle { font-size:14px; font-weight:600; color:var(--text-primary); padding:13px 13px 9px; border-bottom:1px solid var(--border-light); flex-shrink:0; }

/* 좌측 리스트 계층 */
.l-main-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;background:var(--bg-primary);border:1px solid var(--border-mid);transition:background .1s;}
.l-main-row:hover{background:var(--bg-tertiary);}
.l-main-row.sel{background:var(--text-primary);border-color:var(--text-primary);}
.l-main-row.sel *{color:#fff!important;}
.l-main-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.l-main-text{font-size:12px;font-weight:700;color:var(--text-primary);}
.lsec-row{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;margin-top:3px;margin-bottom:1px;}
.lsec-row:hover{background:var(--bg-primary);}
.lsec-row.sel{background:var(--bg-primary);border:1px solid var(--border-mid);}
.l-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.l-sub-text{font-size:12px;font-weight:600;flex:1;}
.ltask-list{padding-left:10px;}
.litem{display:flex;align-items:flex-start;gap:4px;padding:4px 6px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:1px;transition:background .1s;border:1px solid transparent;}
.litem:hover{background:var(--bg-primary);}
.litem.sel{background:var(--bg-primary);border-color:var(--border-mid);}
.l-task-prefix{font-size:10px;color:var(--text-tertiary);flex-shrink:0;margin-top:1px;line-height:1.4;}
.l-task-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ltext{font-size:11px;color:var(--text-primary);line-height:1.35;word-break:keep-all;}
.lbadge{font-size:10px;color:var(--text-tertiary);line-height:1.4;margin-top:1px;}
.lsection{margin-bottom:2px;}
.ldrag-handle{font-size:12px;color:var(--text-tertiary);cursor:grab;flex-shrink:0;opacity:0;transition:opacity .15s;line-height:1;}
.lsec-row:hover .ldrag-handle,.litem:hover .ldrag-handle{opacity:1;}
.ldrop-line{border:1.5px dashed var(--border-mid)!important;background:var(--bg-tertiary)!important;}

/* 우측 카테고리 계층 */
.r-main-btn{width:100%;display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--radius-sm);background:var(--bg-primary);border:1px solid var(--border-mid);cursor:pointer;font-size:12px;font-weight:700;color:var(--text-primary);text-align:left;margin-bottom:5px;transition:background .1s;font-family:inherit;}
.r-main-btn:hover{background:var(--bg-tertiary);}
.r-main-btn.sel{background:var(--text-primary);color:#fff;border-color:var(--text-primary);}
.r-main-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.r-sub-btn{width:100%;display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius-sm);background:var(--bg-primary);border:0.5px solid var(--border-light);cursor:pointer;font-size:12px;font-weight:600;text-align:left;margin-bottom:2px;transition:background .1s;font-family:inherit;}
.r-sub-btn:hover{background:var(--bg-tertiary);}
.r-sub-btn.sel{background:var(--text-primary);color:#fff!important;border-color:var(--text-primary);}
.r-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.r-task-btn{width:100%;display:flex;align-items:center;gap:4px;padding:3px 8px 3px 16px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;font-size:11px;text-align:left;margin-bottom:1px;transition:background .1s;font-family:inherit;color:var(--text-secondary);}
.r-task-btn:hover{background:var(--bg-primary);}
.r-task-btn.sel{background:var(--bg-primary);border:0.5px solid var(--border-light);color:var(--text-primary);font-weight:500;}
.r-task-pre{font-size:10px;color:var(--text-tertiary);flex-shrink:0;}
.r-task-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* 파일 관리 패널 */
#file-panel{flex-shrink:0;border-top:1px solid var(--border-light);background:var(--bg-secondary);}
#file-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;transition:background .1s;}
#file-panel-header:hover{background:var(--bg-tertiary);}
.file-panel-title{font-size:11px;font-weight:600;color:var(--text-secondary);}
#file-panel-arrow{font-size:13px;color:var(--text-tertiary);transition:transform .2s;}
#file-panel-arrow.open{transform:rotate(90deg);}
#file-list-wrap{display:none;padding:4px 8px 6px;}
#file-list-wrap.open{display:block;}
#file-list{max-height:160px;overflow-y:auto;margin-bottom:6px;}
.fitem{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;color:var(--text-secondary);transition:background .1s;}
.fitem:hover{background:var(--bg-primary);color:var(--text-primary);}
.fitem.active{background:var(--bg-primary);color:var(--text-primary);font-weight:600;border:0.5px solid var(--border-mid);}
.fitem-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fitem-del{font-size:12px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;padding:0 2px;opacity:0;line-height:1;}
.fitem:hover .fitem-del{opacity:1;}
.fitem-del:hover{color:#A32D2D;}
#file-actions{display:flex;gap:5px;}
.faction-btn{flex:1;height:26px;font-size:11px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:background .1s;}
.faction-btn:hover{background:var(--bg-tertiary);}
.faction-btn.new{background:var(--text-primary);color:#fff;border-color:var(--text-primary);}
.faction-btn.new:hover{opacity:.85;}
#lscroll{flex:1;overflow-y:auto;padding:8px 10px;min-height:0;}
.lsec-lbl { font-size:12px; font-weight:600; margin:10px 0 4px 2px; }
/* 리스트 드래그 */
.lsection { margin-bottom:2px; }
.lsec-row { display:flex; align-items:center; gap:4px; padding:4px 4px 4px 2px; border-radius:var(--radius-sm); cursor:grab; transition:background .1s; }
.lsec-row:hover { background:var(--bg-primary); }
.ltask-list { padding-left:4px; min-height:4px; }
.ldrag-handle { font-size:13px; color:var(--text-tertiary); cursor:grab; flex-shrink:0; line-height:1; padding:0 2px; opacity:0; transition:opacity .15s; }
.lsec-row:hover .ldrag-handle,
.litem:hover .ldrag-handle { opacity:1; }
.litem { display:flex; align-items:flex-start; gap:5px; padding:5px 6px; border-radius:var(--radius-sm); cursor:pointer; margin-bottom:2px; transition:background .1s, border .1s; border:1px solid transparent; }
.litem:hover { background:var(--bg-primary); }
.litem.sel { background:var(--bg-primary); border-color:var(--border-mid); }
.ldrop-line { border:1.5px dashed var(--border-mid) !important; background:var(--bg-tertiary) !important; }
.ldot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.ltext { font-size:11px; color:var(--text-primary); line-height:1.4; flex:1; word-break:keep-all; }
.lbadge { font-size:10px; color:var(--text-tertiary); line-height:1.4; margin-top:1px; }

/* 우측 패널 */
#rscroll { flex:1; overflow-y:auto; padding:11px 12px; }
.rlbl { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border-light); }
.rslbl { font-size:12px; color:var(--text-secondary); margin:7px 0 3px; }
.rinput { width:100%; height:30px; font-size:12px; padding:0 8px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; margin-bottom:3px; font-family:inherit; }
.rinput::placeholder { font-size:12px; color:var(--text-tertiary); }
.rinput:focus { border-color:var(--border-mid); }
.rtarea { width:100%; height:46px; font-size:12px; padding:6px 8px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; resize:none; margin-bottom:3px; line-height:1.5; font-family:inherit; }
.rtarea::placeholder { font-size:12px; color:var(--text-tertiary); }
.rtarea:focus { border-color:var(--border-mid); }
.rbtn { width:100%; height:30px; font-size:12px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); cursor:pointer; margin-bottom:3px; display:flex; align-items:center; justify-content:center; gap:5px; transition:background .1s; font-family:inherit; }
.rbtn:hover { background:var(--bg-tertiary); }
.rbtn.pri { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }
.rbtn.pri:hover { opacity:.82; }
.rbtn.dan { color:var(--danger); border-color:var(--danger-border); }
.rtag { padding:5px 8px; border-radius:var(--radius-sm); border:1px solid var(--border-light); font-size:12px; color:var(--text-primary); background:var(--bg-primary); cursor:pointer; margin-bottom:3px; width:100%; text-align:left; display:flex; align-items:center; gap:6px; transition:background .1s; line-height:1.35; word-break:keep-all; font-family:inherit; }
.rtag:hover { background:var(--bg-tertiary); }
.rtag.sel { background:var(--text-primary); color:var(--bg-primary); }
.rtag-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.rdiv { border:none; border-top:1px solid var(--border-light); margin:10px 0; }
.rsec { margin-bottom:12px; }
.dim { opacity:.3; pointer-events:none; }

/* 스케줄 토글 */
.sched-toggle-row { display:flex; align-items:center; gap:8px; margin:8px 0 4px; cursor:pointer; user-select:none; }
.sched-toggle-row input[type=checkbox] { display:none; }
.toggle-track { width:32px; height:18px; border-radius:99px; background:var(--border-mid); position:relative; transition:background .2s; flex-shrink:0; cursor:pointer; }
.toggle-track.on { background:var(--accent); }
.toggle-thumb { position:absolute; top:3px; left:3px; width:12px; height:12px; border-radius:50%; background:#fff; transition:transform .2s; }
.toggle-track.on .toggle-thumb { transform:translateX(14px); }
.toggle-label { font-size:12px; color:var(--text-secondary); }
.sched-body { background:var(--bg-tertiary); border-radius:var(--radius-sm); padding:8px 9px; margin-top:4px; }
.sched-body.hidden { display:none; }

/* 반복주기 pills */
.freq-pills { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
.fpill { padding:3px 9px; border-radius:99px; font-size:11px; border:1px solid var(--border-light); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:all .12s; }
.fpill:hover { border-color:var(--border-mid); }
.fpill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.day-pills { display:flex; gap:3px; flex-wrap:wrap; margin-top:2px; }
.dpill { width:27px; height:25px; border-radius:5px; font-size:11px; border:1px solid var(--border-light); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; transition:all .12s; }
.dpill:hover { border-color:var(--border-mid); }
.dpill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.time-row { display:flex; gap:4px; align-items:center; margin-top:6px; }
.time-row select, .time-row .rinput-s { flex:1; height:28px; font-size:12px; padding:0 6px; border:1px solid var(--border-light); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); outline:none; font-family:inherit; }
.time-sep { font-size:11px; color:var(--text-tertiary); flex-shrink:0; }
.sched-slbl { font-size:11px; color:var(--text-secondary); margin:6px 0 2px; }

/* 모드 버튼 */
.mbtn { padding:6px 16px; font-size:12px; border:1px solid var(--border-mid); border-radius:var(--radius-md); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; transition:all .12s; font-family:inherit; }
.mbtn:hover { background:var(--bg-tertiary); }
.mbtn.act { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }

/* SVG + 인라인 편집 오버레이 */
svg#mm { position:absolute; inset:0; width:100%; height:100%; }
#inline-editor { display:none; position:absolute; z-index:50; flex-direction:column; align-items:center; gap:6px; }
#inline-editor.visible { display:flex; }
#inline-input { font-size:13px; font-weight:600; font-family:inherit; border:1.5px solid var(--border-mid); border-radius:var(--radius-sm); padding:5px 10px; outline:none; text-align:center; background:#fff; color:var(--text-primary); min-width:100px; max-width:200px; line-height:1.4; resize:none; }
#inline-input:focus { border-color:var(--accent); }
#inline-confirm { padding:4px 14px; font-size:12px; border-radius:var(--radius-md); border:none; background:var(--accent); color:#fff; cursor:pointer; font-family:inherit; white-space:nowrap; }
#inline-confirm:hover { opacity:.85; }
#inline-cancel { padding:4px 10px; font-size:12px; border-radius:var(--radius-md); border:1px solid var(--border-light); background:#fff; color:var(--text-secondary); cursor:pointer; font-family:inherit; }
.inline-btns { display:flex; gap:5px; }

/* 스케줄 오버레이 (월간 토글) */
#sched-overlay { position:absolute; bottom:10px; right:10px; display:none; gap:6px; z-index:10; align-items:center; }
#sched-overlay.visible { display:flex; }
.sov-btn { padding:4px 10px; font-size:11px; border:1px solid var(--border-mid); border-radius:99px; background:var(--bg-primary); color:var(--text-secondary); cursor:pointer; font-family:inherit; }
.sov-btn.on { background:var(--text-primary); color:var(--bg-primary); }
/* 월간 바 */
#monthly-bar { background:var(--bg-secondary); border-top:1px solid var(--border-light); padding:6px 12px; flex-shrink:0; display:none; }
#monthly-bar.visible { display:block; }
#monthly-bar .mb-title { font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
#monthly-bar .mb-items { display:flex; flex-wrap:wrap; gap:6px; }
.mb-chip { display:flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px; font-size:11px; border:1px solid var(--border-light); }
/* 색상 피커 */
.color-picker-box { background:var(--bg-tertiary); border-radius:var(--radius-sm); padding:8px 10px; margin-top:6px; animation:fadeIn .15s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.cprow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.cplbl { font-size:11px; color:var(--text-secondary); width:36px; flex-shrink:0; }
.cpinput { width:36px; height:26px; border:1px solid var(--border-light); border-radius:5px; padding:2px; cursor:pointer; background:var(--bg-primary); }
.cpval { font-size:10px; color:var(--text-tertiary); font-family:monospace; cursor:pointer; text-decoration:underline dotted; }
.cpval:hover { color:var(--text-secondary); }
.rtag-task { padding-left:18px; font-size:11px; opacity:.85; }
#print-modal { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; }
#print-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.55); }
#print-sheet-wrap { position:relative; z-index:1; display:flex; flex-direction:column; width:min(860px,96vw); height:90vh; background:#e8e6e0; border-radius:12px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.3); }
#print-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#fff; border-bottom:1px solid var(--border-light); flex-shrink:0; }
#print-title { font-size:13px; font-weight:600; color:var(--text-primary); }
.ptbtn { padding:6px 16px; font-size:12px; border:1px solid var(--border-mid); border-radius:var(--radius-md); background:#fff; color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:background .12s; }
.ptbtn:hover { background:var(--bg-tertiary); }
.ptbtn.pri { background:var(--text-primary); color:#fff; border-color:var(--text-primary); }
.ptbtn.pri:hover { opacity:.85; }
#print-scroll { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:center; padding:24px; }
#print-a4 { background:#fff; box-shadow:0 4px 24px rgba(0,0,0,.18); border-radius:2px; flex-shrink:0; }
#print-a4 svg { display:block; }
#toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%) translateY(12px); background:#1a1a18; color:#fff; font-size:12px; padding:8px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; white-space:nowrap; z-index:999; }
#toast.toast-show { opacity:1; transform:translateX(-50%) translateY(0); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="left">
      <div class="ptitle">리스트</div>
      <div id="lscroll"></div>
      <div id="file-panel">
        <div id="file-panel-header" onclick="toggleFilePanel()">
          <span class="file-panel-title">📁 내 작업</span>
          <span id="file-panel-arrow">›</span>
        </div>
        <div id="file-list-wrap">
          <div id="file-list"></div>
          <div id="file-actions">
            <button class="faction-btn" onclick="saveCurrentFile()">💾 저장</button>
            <button class="faction-btn new" onclick="newFile()">＋ 신규</button>
          </div>
        </div>
      </div>
    </div>
    <div id="center">
      <svg id="mm"></svg>
      <!-- 캔버스 하단 버튼 -->
      <div style="position:absolute;bottom:14px;left:12px;z-index:10;display:flex;gap:7px">
        <button onclick="resetView()" style="padding:5px 11px;font-size:11px;border:1px solid var(--border-mid);border-radius:20px;background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:inherit;opacity:0.85">⌖ 뷰 초기화</button>
        <button onclick="nodiArrange()" style="padding:5px 12px;font-size:11px;border:1px solid var(--border-mid);border-radius:20px;background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:inherit;opacity:0.85">🔵 노디 이동 정리</button>
      </div>
      <!-- 인라인 편집 오버레이 -->
      <div id="inline-editor">
        <textarea id="inline-input" rows="2"></textarea>
        <div class="inline-btns">
          <button id="inline-confirm" onclick="confirmInlineEdit()">수정</button>
          <button id="inline-cancel" onclick="cancelInlineEdit()">취소</button>
        </div>
      </div>
      <div id="sched-overlay">
        <span style="font-size:11px;color:var(--text-tertiary)">월간 일정</span>
        <button class="sov-btn on" id="sov-bottom" onclick="setMonthlyPos('bottom')">하단</button>
        <button class="sov-btn" id="sov-top" onclick="setMonthlyPos('top')">상단</button>
        <button class="sov-btn" id="sov-hide" onclick="setMonthlyPos('hide')">숨기기</button>
      </div>
    </div>
    <div id="right"><div class="ptitle">편집 툴</div><div id="rscroll"></div></div>
  </div>
  <div id="monthly-bar"><div class="mb-title">월간 일정</div><div class="mb-items" id="monthly-items"></div></div>
  <div id="bottombar">
    <button class="mbtn act" id="mb-expand" onclick="setMode('expand')">확장형</button>
    <button class="mbtn" id="mb-list" onclick="setMode('list')">리스트형</button>
    <button class="mbtn" id="mb-sched" onclick="setMode('sched')">스케줄 모드</button>
    <div style="width:1px;height:20px;background:var(--border-light);margin:0 4px"></div>
    <button class="mbtn" id="undo-btn" onclick="undo()" style="opacity:0.35" disabled title="Ctrl+Z">↩ 되돌리기</button>
  </div>
</div>

<script>
const PALETTE = {
  0:{l1:'#0C447C',l1bg:'#E6F1FB',l2:'#378ADD',l2bg:'#EEF5FD'},
  1:{l1:'#712B13',l1bg:'#FAECE7',l2:'#D85A30',l2bg:'#FDF3EF'},
  2:{l1:'#085041',l1bg:'#E1F5EE',l2:'#1D9E75',l2bg:'#EDF8F4'},
  3:{l1:'#3C3489',l1bg:'#EEEDFE',l2:'#7F77DD',l2bg:'#F2F2FE'},
  4:{l1:'#633806',l1bg:'#FAEEDA',l2:'#BA7517',l2bg:'#FDF5E8'},
  5:{l1:'#72243E',l1bg:'#FBEAF0',l2:'#D4537E',l2bg:'#FDF0F5'},
  6:{l1:'#3d3d3a',l1bg:'#F1EFE8',l2:'#888780',l2bg:'#F7F6F2'},
};
function getPal(ci,lv,customColors){
  if(customColors&&customColors.stroke) return customColors;
  const p=PALETTE[ci%7];
  return lv===1?{stroke:p.l1,fill:p.l1bg,text:p.l1}:{stroke:p.l2,fill:p.l2bg,text:p.l2};
}

/* hex 색상을 흰색 방향으로 mix (ratio 0~1, 클수록 연해짐) */
function mixWithWhite(hex, ratio){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const nr=Math.round(r+(255-r)*ratio);
  const ng=Math.round(g+(255-g)*ratio);
  const nb=Math.round(b+(255-b)*ratio);
  return '#'+[nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function nodePal(n){
  if(n.level<=1 || !n.pid) return getPal(n.color, n.level, n.customColors);

  /* level 2+ : 부메인 customColors가 있으면 연한 버전으로 파생 */
  const parent=byId(n.pid);
  const sub=parent&&parent.level===1?parent:(parent?byId(parent.pid):null);
  const subNode=parent&&parent.level===1?parent:null;

  if(subNode&&subNode.customColors&&subNode.customColors.stroke){
    const sc=subNode.customColors.stroke;
    /* 테두리: 부메인 색의 60% 연하게, 배경: 85% 연하게, 텍스트: 부메인 색 그대로 */
    return {
      stroke: mixWithWhite(sc, 0.35),
      fill:   mixWithWhite(sc, 0.82),
      text:   mixWithWhite(sc, 0.20),
    };
  }

  return getPal(n.color, n.level, n.customColors);
}

const EL = { 0:{ry:62,rx:62}, 1:{ry:28,rx:54}, 2:{ry:20,rx:38}, 3:{ry:13,rx:22} };
const JITTER = [{ar:1,dr:1},{ar:.93,dr:1.07},{ar:1.06,dr:.95},{ar:.97,dr:1.04},{ar:1.05,dr:.98},{ar:.95,dr:1.06},{ar:1.03,dr:.93},{ar:.99,dr:1.03}];
const DAYS_KO = ['월','화','수','목','금','토','일'];

/* schedule = null(비활성) 또는 { type, days, startHour, duration } */
function emptySchedule(){ return { enabled:false, type:'daily', days:[], startHour:9, duration:1 }; }

let seq=30, selected=null, mode='expand', monthlyPos='bottom';
let dragNode=null, dragOX=0, dragOY=0, didDrag=false;
let editSched = emptySchedule();
let newSched  = emptySchedule();

/* 인라인 편집 상태 */
let inlineNodeId = null;

/* ── 히스토리 ── */
const history=[];
function saveHistory(){ history.push(JSON.stringify(nodes)); if(history.length>30)history.shift(); updateUndoBtn(); }
function undo(){ if(!history.length)return; nodes=JSON.parse(history.pop()); selected=null; cancelInlineEdit(); updateUndoBtn(); render(); showToast('↩ 되돌렸어요'); }
function updateUndoBtn(){ const b=document.getElementById('undo-btn'); if(b){b.disabled=history.length===0; b.style.opacity=history.length===0?'0.35':'1';} }
function showToast(msg){ let t=document.getElementById('toast'); if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);} t.textContent=msg; t.className='toast-show'; clearTimeout(t._timer); t._timer=setTimeout(()=>{t.className='';},2200); }

/* ── 노드 데이터 ── */
let nodes = [
  {id:1,  pid:null, text:'블로그\n키우기', level:0, memo:'', color:0, x:0, y:0, schedule:emptySchedule()},
  {id:2,  pid:1,    text:'네이버',         level:1, memo:'', color:0, x:0, y:0, schedule:emptySchedule()},
  {id:3,  pid:1,    text:'티스토리',       level:1, memo:'', color:1, x:0, y:0, schedule:emptySchedule()},
  {id:4,  pid:1,    text:'스레드 홍보',    level:1, memo:'', color:2, x:0, y:0, schedule:emptySchedule()},
  {id:5,  pid:1,    text:'블로그 스팟',    level:1, memo:'', color:3, x:0, y:0, schedule:emptySchedule()},
  {id:6,  pid:2, text:'경제 포스팅', level:2, memo:'반도체 ETF',           color:0, x:0, y:0,
    schedule:{enabled:true, type:'weekdays', days:[0,1,2,3,4], startHour:21, duration:1}},
  {id:7,  pid:2, text:'영화 후기',   level:2, memo:'영화 호퍼스',          color:0, x:0, y:0,
    schedule:{enabled:true, type:'weekly',   days:[5],          startHour:20, duration:2}},
  {id:8,  pid:3, text:'지원금 포스팅',level:2,memo:'냉방비 지원',          color:1, x:0, y:0,
    schedule:{enabled:true, type:'weekly',   days:[1,3],        startHour:10, duration:1}},
  {id:9,  pid:3, text:'방송 정보',   level:2, memo:'생생정보 / 6시 내고향',color:1, x:0, y:0,
    schedule:{enabled:true, type:'weekdays', days:[0,1,2,3,4],  startHour:18, duration:1}},
];

function kids(pid){ return nodes.filter(n=>n.pid===pid); }
function byId(id){ return nodes.find(n=>n.id===id); }
function rootColor(n){ if(n.level<=1)return n.color; const p=byId(n.pid); return p?rootColor(p):0; }
function getSubtreeOffsets(node,dx,dy){ kids(node.id).forEach(c=>{c.x+=dx;c.y+=dy;c._dragged=true;getSubtreeOffsets(c,dx,dy);}); }

function schedLabel(s){
  if(!s||!s.enabled)return '';
  const tm={daily:'매일',weekdays:'평일',weekend:'주말',weekly:'요일',biweekly:'격주',monthly:'매월'};
  let str=tm[s.type]||s.type;
  if((s.type==='weekly'||s.type==='biweekly')&&s.days&&s.days.length)
    str+=' '+s.days.map(d=>DAYS_KO[d]).join(', ');
  if(s.type==='monthly'&&s.monthlyCount) str+=` ${s.monthlyCount}회`;
  if(s.startHour!=null) str+=` ${String(s.startHour).padStart(2,'0')}:00`;
  if(s.duration&&s.duration>1) str+=`~${String(s.startHour+s.duration).padStart(2,'0')}:00`;
  return str;
}
function schedToDays(s){
  if(!s||!s.enabled)return[];
  if(s.type==='daily')return[0,1,2,3,4,5,6];
  if(s.type==='weekdays')return[0,1,2,3,4];
  if(s.type==='weekend')return[5,6];
  if(s.type==='weekly'||s.type==='biweekly')return s.days||[];
  return[];
}

const sv=document.getElementById('mm');
function cw(){ return document.getElementById('center').offsetWidth||520; }
function ch(){ return document.getElementById('center').offsetHeight||760; }
function mkEl(tag,attrs){ const el=document.createElementNS('http://www.w3.org/2000/svg',tag); Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v)); return el; }

/* ── 레이아웃 ── */
function autoLayout(){
  const root=nodes.find(n=>n.level===0); root.x=cw()/2; root.y=ch()/2;
  layoutChildren(root,-Math.PI/2,Math.PI*2,Math.min(cw(),ch())*0.30);
}
function layoutChildren(parent,startA,spanA,dist){
  const cs=kids(parent.id); if(!cs.length)return;
  cs.forEach((c,i)=>{
    if(c._dragged)return;
    const j=JITTER[(i+parent.id)%JITTER.length];
    const a=startA+spanA*(i+0.5)/cs.length+(i%2===0?.07:-.07);
    c.x=parent.x+Math.cos(a)*dist*j.dr; c.y=parent.y+Math.sin(a)*dist*j.ar;
    layoutChildren(c,a-spanA/cs.length*.5,spanA/cs.length*1.1,dist*.60);
  });
}

/* ── 렌더 ── */
function render(){
  if(mode==='expand')renderExpand();
  else if(mode==='list')renderList();
  else renderSched();
  renderLeft(); renderRight();
  document.getElementById('sched-overlay').classList.toggle('visible',mode==='sched');
  renderMonthlyBar();
}

/* ── 확장형 ── */
function renderExpand(){
  sv.innerHTML=''; autoLayout();
  function drawTree(node){ kids(node.id).forEach(c=>{ const pal=nodePal(c); drawCurve(node.x,node.y,c.x,c.y,pal.stroke,node.level===0?1.8:1.1,node.level===0?.45:.28,c.id); drawTree(c); drawNodeEl(c); }); }
  drawTree(nodes.find(n=>n.level===0));
  drawCenter(nodes.find(n=>n.level===0));
}
function drawCurve(x1,y1,x2,y2,color,sw,op,seed){
  const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  const s=(seed%2===0?1:-1),ox=(-dy/len)*s*len*.09,oy=(dx/len)*s*len*.09;
  sv.appendChild(mkEl('path',{d:`M${x1} ${y1} Q${mx+ox} ${my+oy} ${x2} ${y2}`,fill:'none',stroke:color,'stroke-width':sw,opacity:op,'stroke-linecap':'round'}));
}
function drawCenter(n){
  const cc=n.customColors;
  const bg=cc&&cc.fill?cc.fill:'#1a1a18';
  const tc=cc&&cc.text?cc.text:'#ffffff';
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.appendChild(mkEl('circle',{cx:n.x,cy:n.y,r:62,fill:bg}));
  n.text.split('\n').forEach((ln,i,a)=>{ const t=mkEl('text',{x:n.x,y:n.y+(i-(a.length-1)/2)*20,'text-anchor':'middle','dominant-baseline':'central',fill:tc,'font-size':'16','font-weight':'600'}); t.textContent=ln; g.appendChild(t); });
  sv.appendChild(g);
  g.style.cursor='default';
  let dcTimer=null;
  g.addEventListener('click',()=>{ clearTimeout(dcTimer); dcTimer=setTimeout(()=>{dcTimer=null;},280); selectNode(n.id); });
  g.addEventListener('dblclick',()=>{ clearTimeout(dcTimer); openInlineEditor(n); });
}
function drawNodeEl(n){
  const pal=nodePal(n),E=EL[n.level]||EL[3],rx=E.rx,ry=E.ry,isSel=selected===n.id;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.style.cursor='grab';
  g.appendChild(mkEl('ellipse',{cx:n.x,cy:n.y,rx,ry,fill:isSel?pal.stroke:pal.fill,stroke:pal.stroke,'stroke-width':isSel?0:1}));
  const fs=n.level===1?13:n.level===2?11:9;
  n.text.split('\n').forEach((ln,i,a)=>{ const t=mkEl('text',{x:n.x,y:n.y+(i-(a.length-1)/2)*(fs+2),'text-anchor':'middle','dominant-baseline':'central',fill:isSel?'#fff':pal.text,'font-size':fs,'font-weight':'600'}); t.textContent=ln; g.appendChild(t); });
  const topY=n.y-ry;
  const lbl=schedLabel(n.schedule);
  if(lbl){ const ft=mkEl('text',{x:n.x,y:topY-13,'text-anchor':'middle','dominant-baseline':'central',fill:pal.stroke,'font-size':'9'}); ft.textContent=lbl; g.appendChild(ft); }
  if(n.memo){ n.memo.split('/').map(s=>s.trim()).forEach((ml,mi,arr)=>{ const mx2=n.x+rx+8,my2=n.y+(mi-(arr.length-1)/2)*17,mw=Math.min(ml.length*7+14,130),mh=15; sv.appendChild(mkEl('rect',{x:mx2,y:my2-mh/2,width:mw,height:mh,rx:'5',fill:pal.fill,stroke:pal.stroke,'stroke-width':'0.5'})); const mt=mkEl('text',{x:mx2+6,y:my2,'dominant-baseline':'central',fill:pal.text,'font-size':'9'}); mt.textContent=ml.length>16?ml.slice(0,15)+'…':ml; sv.appendChild(mt); }); }

  /* 드래그 */
  g.addEventListener('mousedown',e=>startDrag(e,n));
  /* 더블클릭 인라인 편집 */
  g.addEventListener('dblclick',e=>{ e.stopPropagation(); openInlineEditor(n); });
  /* 싱글 클릭 선택 */
  g.addEventListener('click',()=>{ if(!didDrag)selectNode(n.id); });
  sv.appendChild(g);
}

/* ── 뷰 초기화 ── */
function resetView(){ vx=0; vy=0; vscale=1; nodes.forEach(n=>n._dragged=false); render(); }

/* ── 노디 이동 정리 — 겹치지 않게 배치 ── */
function nodiArrange(){
  const root=nodes.find(n=>n.level===0); if(!root)return;
  const subs=kids(root.id); const N=subs.length; if(!N)return;

  /* 부메인 반경: 메인(62) + 부메인 rx(54) + 여유 */
  const subR = 62 + 54 + 50;
  /* 부메인 간 최소 간격: 부메인 rx*2 + 여유 */
  const subMinGap = 54*2 + 30;
  /* 실제 필요 반경 계산 (원주 기반) */
  const circumNeeded = N * subMinGap;
  const radiusNeeded = circumNeeded / (2 * Math.PI);
  const finalSubR = Math.max(subR, radiusNeeded);

  subs.forEach((sub, i) => {
    const a = (i / N) * Math.PI * 2 - Math.PI / 2;
    sub.x = root.x + Math.cos(a) * finalSubR;
    sub.y = root.y + Math.sin(a) * finalSubR;
    sub._dragged = true;

    const tasks = kids(sub.id); const T = tasks.length; if(!T) return;
    /* 하위 노드: 부메인(ry:28) + 하위(ry:20) + 여유 */
    const taskR = 28 + 20 + 45;
    const taskMinGap = 38*2 + 20;
    const taskCircumNeeded = T * taskMinGap;
    const taskRadiusNeeded = taskCircumNeeded / (2 * Math.PI);
    const finalTaskR = Math.max(taskR, taskRadiusNeeded);
    /* 부채꼴 방향으로 펼치되 겹치지 않게 */
    const fanSpan = Math.min(Math.PI * 1.2, T * 0.55);
    tasks.forEach((task, ti) => {
      const ta = a + (ti - (T-1)/2) * (T > 1 ? fanSpan/(T-1) : 0);
      task.x = sub.x + Math.cos(ta) * finalTaskR;
      task.y = sub.y + Math.sin(ta) * finalTaskR;
      task._dragged = true;
    });
  });
  showToast('🔵 노디가 정리했어요');
  renderExpand();
}
function openInlineEditor(n){
  cancelInlineEdit();
  inlineNodeId=n.id;
  const editor=document.getElementById('inline-editor');
  const input=document.getElementById('inline-input');
  input.value=n.text.replace('\n',' ');
  /* 노드 화면 위치: 캔버스 좌표 → 화면 좌표 (pan/zoom 반영) */
  const E=EL[n.level]||EL[3];
  const sx = n.x * vscale + vx;
  const sy = (n.y - E.ry) * vscale + vy - 10;
  editor.style.left = sx + 'px';
  editor.style.top  = sy + 'px';
  editor.style.transform = 'translateX(-50%)';
  editor.classList.add('visible');
  input.focus(); input.select();
}
function confirmInlineEdit(){
  if(!inlineNodeId)return;
  const n=byId(inlineNodeId);
  const val=document.getElementById('inline-input').value.trim();
  if(val&&val!==n.text.replace('\n',' ')){
    saveHistory();
    n.text=val;
    showToast('✓ 수정됐어요');
  }
  cancelInlineEdit();
  render();
}
function cancelInlineEdit(){
  inlineNodeId=null;
  document.getElementById('inline-editor').classList.remove('visible');
}
document.getElementById('inline-input').addEventListener('keydown',e=>{
  if(e.key==='Escape') cancelInlineEdit();
});

/* ── 드래그 ── */
function clientToCanvas(cx,cy){
  const rect=document.getElementById('center').getBoundingClientRect();
  return{x:(cx-rect.left-vx)/vscale, y:(cy-rect.top-vy)/vscale};
}
function startDrag(e,n){
  didDrag=false; dragNode=n;
  const p=e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
  const cp=clientToCanvas(p.x,p.y);
  dragOX=cp.x-n.x; dragOY=cp.y-n.y;
  e.stopPropagation();
  if(e.type==='mousedown') e.preventDefault();
}
function moveDrag(cx,cy){
  if(!dragNode||mode!=='expand')return;
  didDrag=true;
  const cp=clientToCanvas(cx,cy);
  const nx=cp.x-dragOX, ny=cp.y-dragOY;
  const dx=nx-dragNode.x, dy=ny-dragNode.y;
  dragNode.x=nx; dragNode.y=ny; dragNode._dragged=true;
  if(dragNode.level===1) getSubtreeOffsets(dragNode,dx,dy);
  renderExpand();
}
document.addEventListener('mousemove',e=>{
  if(dragNode){ moveDrag(e.clientX,e.clientY); return; }
  if(!isPanning||mode!=='expand')return;
  vx+=e.clientX-panLast.x; vy+=e.clientY-panLast.y;
  panLast={x:e.clientX,y:e.clientY};
  const g=document.getElementById('mm-world');
  if(g)g.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
});
document.addEventListener('mouseup',()=>{ dragNode=null; isPanning=false; });

/* ── 선택 ── */
function selectNode(id){
  selected=id; pendingColors={};
  const n=byId(id);
  if(n&&n.schedule) editSched={...n.schedule, days:[...(n.schedule.days||[])]};
  else editSched=emptySchedule();
  render();
}

/* ── 리스트형 ── */
function renderList(){
  sv.innerHTML=''; const W=cw(),px=56; let y=50;
  const root=nodes.find(n=>n.level===0);
  const title=mkEl('text',{x:W/2,y,fill:'#1a1a18','text-anchor':'middle','font-size':'18','font-weight':'700','dominant-baseline':'central'}); title.textContent=root.text.replace('\n',' '); sv.appendChild(title); y+=40;
  sv.appendChild(mkEl('line',{x1:px,y1:y,x2:W-px,y2:y,stroke:'#e2dfd8','stroke-width':'1'})); y+=22;
  kids(root.id).forEach(sub=>{
    const pal=nodePal(sub);
    sv.appendChild(mkEl('rect',{x:px,y:y-2,width:W-px*2,height:28,rx:'6',fill:pal.fill,stroke:pal.stroke,'stroke-width':'0.8'}));
    const sl=mkEl('text',{x:px+13,y:y+13,fill:pal.text,'font-size':'13','font-weight':'600','dominant-baseline':'central'}); sl.textContent=sub.text.replace('\n',' '); sv.appendChild(sl); y+=36;
    kids(sub.id).forEach(task=>{
      const tp=nodePal(task);
      const tl=mkEl('text',{x:px+22,y:y+7,fill:tp.text,'font-size':'12','dominant-baseline':'central','font-weight':'500'}); tl.textContent='· '+task.text.replace('\n',' '); sv.appendChild(tl);
      const lbl=schedLabel(task.schedule);
      if(lbl){ const fl=mkEl('text',{x:W-px-10,y:y+7,fill:tp.text,'font-size':'10','dominant-baseline':'central','text-anchor':'end',opacity:'.75'}); fl.textContent=lbl; sv.appendChild(fl); }
      y+=22;
      if(task.memo){ task.memo.split('/').forEach(m=>{ const ml=mkEl('text',{x:px+36,y:y+5,fill:'#999890','font-size':'10','dominant-baseline':'central'}); ml.textContent='→ '+m.trim(); sv.appendChild(ml); y+=17; }); }
      y+=4;
    }); y+=8;
  });
}

/* ── 스케줄 모드 ── */
function renderSched(){
  sv.innerHTML='';
  const W=cw(), H=ch();
  const H_START=6, H_END=24, H_TOTAL=H_END-H_START;
  const padL=42, padT=28, colW=Math.floor((W-padL)/7), gridH=H-padT-6;
  const hPx=gridH/H_TOTAL;

  DAYS_KO.forEach((d,i)=>{
    const x=padL+i*colW+colW/2;
    const hdr=mkEl('text',{x,y:14,'text-anchor':'middle','dominant-baseline':'central',fill:'#555550','font-size':'11','font-weight':'600'}); hdr.textContent=d; sv.appendChild(hdr);
    sv.appendChild(mkEl('rect',{x:padL+i*colW+1,y:padT,width:colW-2,height:gridH,rx:'4',fill:i>=5?'#f7f6f3':'#ffffff',stroke:'#e2dfd8','stroke-width':'0.8'}));
  });
  for(let h=H_START;h<=H_END;h+=2){
    const y=padT+(h-H_START)*hPx;
    const sl=mkEl('text',{x:padL-5,y,'text-anchor':'end','dominant-baseline':'central',fill:'#999890','font-size':'9'}); sl.textContent=`${String(h).padStart(2,'0')}:00`; sv.appendChild(sl);
    if(h>H_START) sv.appendChild(mkEl('line',{x1:padL,y1:y,x2:W,y2:y,stroke:'#e2dfd8','stroke-width':'0.5','stroke-dasharray':h%6===0?'':'3,3'}));
  }
  const colStack=Array.from({length:7},()=>[]);
  nodes.filter(n=>n.level>=1&&n.schedule&&n.schedule.enabled&&n.schedule.type!=='monthly').forEach(task=>{
    const pal=nodePal(task), s=task.schedule, dd=schedToDays(s);
    dd.forEach(di=>{
      const sh=Math.max(s.startHour,H_START), eh=Math.min(s.startHour+(s.duration||1),H_END);
      const y=padT+(sh-H_START)*hPx, bh=(eh-sh)*hPx-2;
      const overlap=colStack[di].filter(b=>b.sh<eh&&b.eh>sh).length;
      const bw=Math.max(colW-10-overlap*4,20), bx=padL+di*colW+3+overlap*4;
      colStack[di].push({sh,eh});
      sv.appendChild(mkEl('rect',{x:bx,y,width:bw,height:Math.max(bh,14),rx:'4',fill:pal.fill,stroke:pal.stroke,'stroke-width':'0.7'}));

    });
  });

function startListDrag(e, nodeId, level, el){
  listDrag.active = true; listDrag.nodeId = nodeId; listDrag.level = level;
  e.dataTransfer.effectAllowed = 'move';
  el.style.opacity = '0.45';
  listDrag.srcEl = el;
}
function endListDrag(){
  if(listDrag.srcEl) listDrag.srcEl.style.opacity = '';
  document.querySelectorAll('.ldrop-line').forEach(e=>e.classList.remove('ldrop-line'));
  listDrag = {active:false, nodeId:null, level:null, ghost:null, overEl:null, srcEl:null};
}
function onListDragOver(e, overId, level, el){
  if(!listDrag.active || listDrag.level !== level) return;
  if(listDrag.nodeId === overId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.ldrop-line').forEach(x=>x.classList.remove('ldrop-line'));
  /* 마우스가 요소 위쪽이면 위에, 아래면 아래에 인디케이터 */
  const rect = el.getBoundingClientRect();
  const mid  = rect.top + rect.height/2;
  el.classList.add('ldrop-line');
  listDrag.dropBefore = e.clientY < mid;
  listDrag.overNodeId = overId;
}
function onListDrop(e, overId, level, fallbackParentId){
  e.preventDefault();
  if(!listDrag.active || listDrag.level !== level) return;
  const dragId = listDrag.nodeId;
  if(dragId === overId) return;
  saveHistory();

  if(level===1){
    /* 부메인 순서 교환 */
    const root = nodes.find(n=>n.level===0);
    const subs = kids(root.id);
    const ai = subs.findIndex(n=>n.id===dragId);
    const bi = subs.findIndex(n=>n.id===overId);
    if(ai<0||bi<0)return;
    /* nodes 배열에서 두 위치를 swap */
    const aIdx = nodes.indexOf(subs[ai]);
    const bIdx = nodes.indexOf(subs[bi]);
    [nodes[aIdx], nodes[bIdx]] = [nodes[bIdx], nodes[aIdx]];
  } else {
    /* 할일 순서 재배치 */
    const dragNode2 = byId(dragId);
    if(!dragNode2) return;
    if(overId === null){
      /* 빈 섹션에 drop — parentId 변경 */
      if(fallbackParentId) dragNode2.pid = fallbackParentId;
    } else {
      const overNode = byId(overId);
      if(!overNode) return;
      /* 같은 부모인지 아닌지 무관하게 위치 재배치 */
      const di = nodes.indexOf(dragNode2);
      const oi = nodes.indexOf(overNode);
      nodes.splice(di,1);
      const newOi = nodes.indexOf(overNode);
      const insertAt = listDrag.dropBefore ? newOi : newOi+1;
      nodes.splice(insertAt,0,dragNode2);
      /* 부모도 맞춰줌 */
      dragNode2.pid = overNode.pid;
    }
  }
  render();
}

function toggleSchedEnabled(prefix){
  const s=prefix==='new'?newSched:editSched;
  s.enabled=!s.enabled;
  const body=document.getElementById(`${prefix}-sched-body`);
  const track=body&&body.previousElementSibling?body.previousElementSibling.querySelector('.toggle-track'):null;
  if(body) body.classList.toggle('hidden',!s.enabled);
  if(track) track.classList.toggle('on',s.enabled);
}
function setSchedType(prefix,val){
  const s=prefix==='new'?newSched:editSched; s.type=val;
  if(val==='weekdays') s.days=[0,1,2,3,4];
  else if(val==='weekend') s.days=[5,6];
  else if(val==='daily') s.days=[];
  const labels={daily:'매일',weekdays:'평일',weekend:'주말',weekly:'요일지정',biweekly:'격주',monthly:'매월'};
  document.querySelectorAll(`#${prefix}-type-pills .fpill`).forEach(b=>b.classList.toggle('on',b.textContent.trim()===labels[val]));
  const dw=document.getElementById(`${prefix}-day-wrap`);
  if(dw) dw.style.display=(val==='weekly'||val==='biweekly')?'':'none';
  const mw=document.getElementById(`${prefix}-monthly-wrap`);
  if(mw) mw.style.display=val==='monthly'?'':'none';
}
function toggleSchedDay(prefix,idx){
  const s=prefix==='new'?newSched:editSched;
  const i=s.days.indexOf(idx); if(i>=0) s.days.splice(i,1); else s.days.push(idx); s.days.sort((a,b)=>a-b);

}

  if(selected===1){showToast('⚠️ 메인 노드는 삭제할 수 없어요');return;}
  saveHistory();
  const rm=new Set([selected]); let changed=true;
  while(changed){changed=false;nodes.forEach(n=>{if(rm.has(n.pid)&&!rm.has(n.id)){rm.add(n.id);changed=true;}});}
  nodes=nodes.filter(n=>!rm.has(n.id)); selected=null;
  showToast('🗑 삭제됐어요  •  Ctrl+Z 로 되돌리기');
  render();
}
function exportText(){
  const root=nodes.find(n=>n.level===0); let out=root.text.replace('\n',' ')+'\n\n';
  kids(root.id).forEach(sub=>{ out+=`【${sub.text.replace('\n',' ')}】\n`; kids(sub.id).forEach(task=>{ out+=`  · ${task.text.replace('\n',' ')}`; const lbl=schedLabel(task.schedule); if(lbl)out+=` — ${lbl}`; if(task.memo)out+=`\n    메모: ${task.memo}`; out+='\n'; }); out+='\n'; });
  const blob=new Blob([out],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='루틴_마인드맵.txt'; a.click();
}

/* ── 인쇄 미리보기 ── */
function openPrintPreview(){
  /* 확장형: A4 가로 (1123×794), 나머지: A4 세로 (794×1123) */
  const isLandscape = mode==='expand';
  const A4W = isLandscape ? 1123 : 794;
  const A4H = isLandscape ? 794  : 1123;
  const root=nodes.find(n=>n.level===0);
  let svgContent='';

  if(mode==='expand'){
    const allN=nodes.filter(n=>n.x!==undefined);
    const xs=allN.map(n=>n.x), ys=allN.map(n=>n.y);
    const minX=Math.min(...xs)-90, maxX=Math.max(...xs)+90;
    const minY=Math.min(...ys)-90, maxY=Math.max(...ys)+90;
    const contentW=maxX-minX, contentH=maxY-minY;
    const scale=Math.min((A4W-80)/contentW,(A4H-80)/contentH,1.2);
    const offX=(A4W-(contentW*scale))/2-minX*scale;
    const offY=(A4H-(contentH*scale))/2-minY*scale;
    let edges='';
    function edgesFor(node){ kids(node.id).forEach(c=>{ const pal=nodePal(c); const mx=(node.x+c.x)/2,my=(node.y+c.y)/2,dx=c.x-node.x,dy=c.y-node.y,len=Math.sqrt(dx*dx+dy*dy)||1; const s=(c.id%2===0?1:-1),ox=(-dy/len)*s*len*.09,oy=(dx/len)*s*len*.09; edges+=`<path d="M${node.x} ${node.y} Q${mx+ox} ${my+oy} ${c.x} ${c.y}" fill="none" stroke="${pal.stroke}" stroke-width="${node.level===0?1.8:1.1}" opacity="${node.level===0?.45:.28}" stroke-linecap="round"/>`; edgesFor(c); }); }
    edgesFor(root);
    let nodesStr='';
    function nodesFor(node){
      if(node.level===0){ const cc=node.customColors; nodesStr+=`<circle cx="${node.x}" cy="${node.y}" r="62" fill="${cc?.fill||'#1a1a18'}"/>`; node.text.split('\n').forEach((ln,i,a)=>{ nodesStr+=`<text x="${node.x}" y="${node.y+(i-(a.length-1)/2)*20}" text-anchor="middle" dominant-baseline="central" fill="${cc?.text||'#fff'}" font-size="16" font-weight="600" font-family="sans-serif">${ln}</text>`; }); return; }
      const pal=nodePal(node),E=EL[node.level]||EL[3];
      nodesStr+=`<ellipse cx="${node.x}" cy="${node.y}" rx="${E.rx}" ry="${E.ry}" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="1"/>`;
      const fs=node.level===1?13:node.level===2?11:9;
      node.text.split('\n').forEach((ln,i,a)=>{ nodesStr+=`<text x="${node.x}" y="${node.y+(i-(a.length-1)/2)*(fs+2)}" text-anchor="middle" dominant-baseline="central" fill="${pal.text}" font-size="${fs}" font-weight="600" font-family="sans-serif">${ln}</text>`; });
      const lbl=schedLabel(node.schedule);
      if(lbl) nodesStr+=`<text x="${node.x}" y="${node.y-E.ry-13}" text-anchor="middle" fill="${pal.stroke}" font-size="9" font-family="sans-serif">${lbl}</text>`;
      if(node.memo){ node.memo.split('/').map(s=>s.trim()).forEach((ml,mi,arr)=>{ const mx2=node.x+E.rx+8,my2=node.y+(mi-(arr.length-1)/2)*17,mw=Math.min(ml.length*7+14,130),mh=15; nodesStr+=`<rect x="${mx2}" y="${my2-mh/2}" width="${mw}" height="${mh}" rx="5" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="0.5"/><text x="${mx2+6}" y="${my2}" dominant-baseline="central" fill="${pal.text}" font-size="9" font-family="sans-serif">${ml.length>16?ml.slice(0,15)+'…':ml}</text>`; }); }
      kids(node.id).forEach(c=>nodesFor(c));
    }
    nodes.filter(n=>n.level>0).forEach(n=>nodesFor(n)); nodesFor(root);
    svgContent=`<g transform="translate(${offX},${offY}) scale(${scale})">${edges}${nodesStr}</g>`;

  } else if(mode==='list'){
    let y=60, out='';
    out+=`<text x="${A4W/2}" y="${y}" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a18" font-family="sans-serif">${root.text.replace('\n',' ')}</text>`; y+=36;
    out+=`<line x1="50" y1="${y}" x2="${A4W-50}" y2="${y}" stroke="#ccc9c0" stroke-width="1"/>`; y+=22;
    kids(root.id).forEach(sub=>{
      const pal=nodePal(sub);
      out+=`<rect x="50" y="${y-2}" width="${A4W-100}" height="30" rx="6" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="0.8"/>`;
      out+=`<text x="63" y="${y+14}" fill="${pal.text}" font-size="14" font-weight="600" dominant-baseline="central" font-family="sans-serif">${sub.text.replace('\n',' ')}</text>`; y+=38;
      kids(sub.id).forEach(task=>{
        const tp=nodePal(task);
        out+=`<text x="74" y="${y+8}" fill="${tp.text}" font-size="12" font-weight="500" dominant-baseline="central" font-family="sans-serif">· ${task.text.replace('\n',' ')}</text>`;
        const lbl=schedLabel(task.schedule);
        if(lbl) out+=`<text x="${A4W-60}" y="${y+8}" fill="${tp.text}" font-size="10" text-anchor="end" dominant-baseline="central" opacity=".75" font-family="sans-serif">${lbl}</text>`;
        y+=22;
        if(task.memo){ task.memo.split('/').forEach(m=>{ out+=`<text x="90" y="${y+5}" fill="#999890" font-size="10" dominant-baseline="central" font-family="sans-serif">→ ${m.trim()}</text>`; y+=17; }); }
        y+=4;
      }); y+=10;
    });
    svgContent=out;

  } else {
    const H_START=6,H_END=24,H_TOTAL=H_END-H_START;
    const padL=48,padT=50,colW=Math.floor((A4W-padL)/7),gridH=A4H-padT-80,hPx=gridH/H_TOTAL;
    let out='';
    out+=`<text x="${A4W/2}" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a18" font-family="sans-serif">${root.text.replace('\n',' ')} — 주간 스케줄</text>`;
    DAYS_KO.forEach((d,i)=>{ const x=padL+i*colW+colW/2; out+=`<text x="${x}" y="${padT-10}" text-anchor="middle" font-size="11" font-weight="600" fill="#555550" font-family="sans-serif">${d}</text><rect x="${padL+i*colW+1}" y="${padT}" width="${colW-2}" height="${gridH}" rx="4" fill="${i>=5?'#f7f6f3':'#ffffff'}" stroke="#e2dfd8" stroke-width="0.8"/>`; });
    for(let h=H_START;h<=H_END;h+=2){ const y=padT+(h-H_START)*hPx; out+=`<text x="${padL-5}" y="${y}" text-anchor="end" dominant-baseline="central" fill="#999890" font-size="8" font-family="sans-serif">${String(h).padStart(2,'0')}:00</text>`; if(h>H_START) out+=`<line x1="${padL}" y1="${y}" x2="${A4W}" y2="${y}" stroke="#e2dfd8" stroke-width="0.5" stroke-dasharray="${h%6===0?'':'3,3'}"/>`; }
    const colStack=Array.from({length:7},()=>[]);
    nodes.filter(n=>n.level>=1&&n.schedule&&n.schedule.enabled&&n.schedule.type!=='monthly').forEach(task=>{
      const pal=nodePal(task),s=task.schedule,dd=schedToDays(s);
      dd.forEach(di=>{ const sh=Math.max(s.startHour,H_START),eh=Math.min(s.startHour+(s.duration||1),H_END),y=padT+(sh-H_START)*hPx,bh=(eh-sh)*hPx-2,overlap=colStack[di].filter(b=>b.sh<eh&&b.eh>sh).length,bw=Math.max(colW-10-overlap*4,20),bx=padL+di*colW+3+overlap*4; colStack[di].push({sh,eh}); out+=`<rect x="${bx}" y="${y}" width="${bw}" height="${Math.max(bh,14)}" rx="4" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="0.7"/><text x="${bx+5}" y="${y+Math.max(bh,14)/2}" dominant-baseline="central" fill="${pal.text}" font-size="9" font-weight="500" font-family="sans-serif">${task.text.length>7?task.text.slice(0,6)+'…':task.text}</text>`; });
    });
    svgContent=out;
  }

  /* 기존 모달 제거 후 새로 생성 */
  const existing=document.getElementById('print-modal'); if(existing) existing.remove();
  const modal=document.createElement('div');
  modal.id='print-modal';
  modal.innerHTML=`
    <div id="print-backdrop" onclick="closePrintPreview()"></div>
    <div id="print-sheet-wrap">
      <div id="print-toolbar">
        <span id="print-title">인쇄 미리보기 — ${mode==='expand'?'확장형 (가로)':mode==='list'?'리스트형':'스케줄 모드'}</span>
        <div style="display:flex;gap:8px">
          <button class="ptbtn" onclick="closePrintPreview()">닫기</button>
          <button class="ptbtn pri" onclick="doPrint(${isLandscape})">🖨 인쇄</button>
        </div>
      </div>
      <div id="print-scroll">
        <div id="print-a4" style="${isLandscape?'width:'+A4W+'px;':''}">
          <svg id="print-svg" xmlns="http://www.w3.org/2000/svg"
            width="${A4W}" height="${A4H}" viewBox="0 0 ${A4W} ${A4H}">
            <rect width="${A4W}" height="${A4H}" fill="white"/>
            ${svgContent}
          </svg>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function closePrintPreview(){
  const m=document.getElementById('print-modal');
  if(m) m.remove();
}

function doPrint(landscape){
  const svg=document.getElementById('print-svg');
  if(!svg) return;
  const serializer=new XMLSerializer();
  const svgStr=serializer.serializeToString(svg);
  const win=window.open('','_blank','width=1000,height=800');
  const w=landscape?'297mm':'210mm', h=landscape?'210mm':'297mm';
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>루틴 마인드맵</title>
  <style>
    @page { size:${landscape?'A4 landscape':'A4'}; margin:0; }
    body { margin:0; padding:0; background:#fff; }
    img { width:${w}; height:${h}; display:block; }
  </style></head><body>`);
  const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  win.document.write(`<img src="${url}" onload="window.print();URL.revokeObjectURL('${url}')"/>`);
  win.document.write('</body></html>');
  win.document.close();
}
/* ── 색상 피커 ── */
let pendingColors = {};
function copyHex(el){
  const hex=el.textContent.trim();
  navigator.clipboard.writeText(hex).then(()=>showToast('📋 '+hex+' 복사됐어요')).catch(()=>{
    /* 폴백: execCommand */
    const ta=document.createElement('textarea'); ta.value=hex;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 '+hex+' 복사됐어요');
  });
}
function previewColor(key, val){
  pendingColors[key]=val;
  const el=document.getElementById('cpv-'+key);
  if(el) el.textContent=val;
  /* 즉시 미리보기 */
  const n=byId(selected); if(!n)return;
  if(!n.customColors) n.customColors={};
  n.customColors[key]=val;
  if(mode==='expand') renderExpand();
}
function applyColor(){
  const n=byId(selected); if(!n)return;
  saveHistory();
  if(!n.customColors) n.customColors={};
  Object.assign(n.customColors, pendingColors);
  pendingColors={};
  showToast('✓ 색상이 적용됐어요');
  render();
}
function resetColor(){
  const n=byId(selected); if(!n)return;
  saveHistory();
  n.customColors=null;
  pendingColors={};
  showToast('↺ 기본 색상으로 초기화됐어요');
  render();
}
function setMode(m){
  mode=m; selected=null; cancelInlineEdit();
  ['expand','list','sched'].forEach(x=>document.getElementById('mb-'+x).classList.toggle('act',x===m));
  render();
}
window.addEventListener('resize',()=>render());
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();} if(e.key==='Escape')cancelInlineEdit(); });
render();
</script>
